        const ExecutableBlock = ({ htmlCode }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && htmlCode) {
                    const slot = document.createElement('div');
                    slot.innerHTML = htmlCode;
                    const scripts = slot.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                    containerRef.current.innerHTML = '';
                    containerRef.current.appendChild(slot);
                }
            }, [htmlCode]);
            return <div ref={containerRef} className="executed-code-container text-xs text-emerald-200" />;
        };

                styleEl.innerHTML = data.settings.customCSS || '';

            const formatTime = (t) => `${t.year}-${pad(t.month)}-${pad(t.day)} ${pad(t.hour)}:${pad(t.minute)}`;
            const getDateStr = (t) => `${t.year}-${pad(t.month)}-${pad(t.day)}`;
            
            const advanceTime = (current, addMins) => {
                let d = new Date(current.year, current.month - 1, current.day, current.hour, current.minute);
                d.setMinutes(d.getMinutes() + addMins);
                return { year: d.getFullYear(), month: d.getMonth() + 1, day: d.getDate(), hour: d.getHours(), minute: d.getMinutes() };
            };
            
            const getTimeDiff = (t1, t2) => {
                const d1 = new Date(t1.year, t1.month-1, t1.day, t1.hour, t1.minute).getTime();
                const d2 = new Date(t2.year, t2.month-1, t2.day, t2.hour, t2.minute).getTime();
                return (d1 - d2) / 60000; 
            };

            const getBaseEndpoint = (url) => url.trim().replace(/\/+$/, '').replace(/\/chat\/completions$/, '');

            // --- 记忆系统工具函数 ---
            const generateMemoryId = () => 'mem_' + generateId();
            
            const rateMemory = (content, context, characterId) => {
                // 简单的记忆评分算法
                // 基于内容长度、情感词汇和关键词
                let score = 1;
                
                // 内容长度评分
                if (content.length > 50) score += 1;
                if (content.length > 100) score += 1;
                
                // 情感词汇评分
                const positiveEmotions = ['喜欢', '爱', '感谢', '开心', '兴奋'];
                const negativeEmotions = ['讨厌', '恨', '生气', '难过', '悲伤'];
                const strongEmotions = positiveEmotions.concat(negativeEmotions);
                
                for (const emotion of strongEmotions) {
                    if (content.includes(emotion) || context.includes(emotion)) {
                        score += 1;
                        break;
                    }
                }
                
                // 关键词评分
                const keyWords = ['重要', '第一次', '永远', '承诺', '告别', '危机'];
                for (const word of keyWords) {
                    if (content.includes(word) || context.includes(word)) {
                        score += 1;
                        break;
                    }
                }
                
                return Math.min(5, score);
            };
            
            const addMemory = (npcId, content, context = '') => {
                const npc = data.npcs.find(n => n.id === npcId);
                if (!npc) return;
                
                const score = rateMemory(content, context, npcId);
                const memoryItem = {
                    id: generateMemoryId(),
                    content: content,
                    timestamp: formatTime(data.time),
                    level: score,
                    emotion: 'neutral',
                    context: context,
                    relatedEvents: []
                };
                
                setData(prev => {
                    const updatedNpcs = prev.npcs.map(n => {
                        if (n.id === npcId) {
                            const updatedMemorySystem = { ...n.memorySystem };
                            
                            // 根据评分添加到相应的记忆数组
                            switch (score) {
                                case 5:
                                    updatedMemorySystem.coreMemories.push(memoryItem);
                                    break;
                                case 4:
                                    updatedMemorySystem.importantMemories.push(memoryItem);
                                    break;
                                case 3:
                                    updatedMemorySystem.recentMemories.push(memoryItem);
                                    break;
                                case 2:
                                    updatedMemorySystem.minorMemories.push(memoryItem);
                                    break;
                                default:
                                    updatedMemorySystem.trivialMemories.push(memoryItem);
                            }
                            
                            return { ...n, memorySystem: updatedMemorySystem };
                        }
                        return n;
                    });
                    return { ...prev, npcs: updatedNpcs };
                });
            };
            
            const organizeMemories = (npcId) => {
                const npc = data.npcs.find(n => n.id === npcId);
                if (!npc) return;
                
                setData(prev => {
                    const updatedNpcs = prev.npcs.map(n => {
                        if (n.id === npcId) {
                            const updatedMemorySystem = { ...n.memorySystem };
                            
                            // 降级记忆
                            // 1-2级记忆：7天未提及自动降级
                            // 3级记忆：30天未提及自动降级
                            const now = data.time;
                            
                            // 处理琐事记忆（1级）
                            updatedMemorySystem.trivialMemories = updatedMemorySystem.trivialMemories.filter(mem => {
                                const memTime = {
                                    year: parseInt(mem.timestamp.substring(0, 4)),
                                    month: parseInt(mem.timestamp.substring(5, 7)),
                                    day: parseInt(mem.timestamp.substring(8, 10)),
                                    hour: parseInt(mem.timestamp.substring(11, 13)),
                                    minute: parseInt(mem.timestamp.substring(14, 16))
                                };
                                return getTimeDiff(now, memTime) < 7 * 24 * 60; // 7天
                            });
                            
                            // 处理次要记忆（2级）
                            updatedMemorySystem.minorMemories = updatedMemorySystem.minorMemories.filter(mem => {
                                const memTime = {
                                    year: parseInt(mem.timestamp.substring(0, 4)),
                                    month: parseInt(mem.timestamp.substring(5, 7)),
                                    day: parseInt(mem.timestamp.substring(8, 10)),
                                    hour: parseInt(mem.timestamp.substring(11, 13)),
                                    minute: parseInt(mem.timestamp.substring(14, 16))
                                };
                                if (getTimeDiff(now, memTime) >= 7 * 24 * 60) {
                                    // 降级到琐事记忆
                                    updatedMemorySystem.trivialMemories.push({ ...mem, level: 1 });
                                    return false;
                                }
                                return true;
                            });
                            
                            // 处理近期记忆（3级）
                            updatedMemorySystem.recentMemories = updatedMemorySystem.recentMemories.filter(mem => {
                                const memTime = {
                                    year: parseInt(mem.timestamp.substring(0, 4)),
                                    month: parseInt(mem.timestamp.substring(5, 7)),
                                    day: parseInt(mem.timestamp.substring(8, 10)),
                                    hour: parseInt(mem.timestamp.substring(11, 13)),
                                    minute: parseInt(mem.timestamp.substring(14, 16))
                                };
                                if (getTimeDiff(now, memTime) >= 30 * 24 * 60) {
                                    // 降级到次要记忆
                                    updatedMemorySystem.minorMemories.push({ ...mem, level: 2 });
                                    return false;
                                }
                                return true;
                            });
                            
                            return { ...n, memorySystem: updatedMemorySystem };
                        }
                        return n;
                    });
                    return { ...prev, npcs: updatedNpcs };
                });
            };
            
            const getRelevantMemories = (npcId, context = '', limit = 5) => {
                const npc = data.npcs.find(n => n.id === npcId);
                if (!npc || !npc.memorySystem) return [];
                
                // 合并所有记忆
                const allMemories = [
                    ...(npc.memorySystem.coreMemories || []),
                    ...(npc.memorySystem.importantMemories || []),
                    ...(npc.memorySystem.recentMemories || []),
                    ...(npc.memorySystem.minorMemories || []),
                    ...(npc.memorySystem.trivialMemories || [])
                ];
                
                // 根据相关性排序
                const scoredMemories = allMemories.map(mem => {
                    let score = mem.level;
                    
                    // 上下文匹配
                    if (context) {
                        const contextWords = context.split(' ');
                        for (const word of contextWords) {
                            if (mem.content.includes(word) || mem.context.includes(word)) {
                                score += 0.5;
                            }
                        }
                    }
                    
                    // 时间权重
                    const memTime = {
                        year: parseInt(mem.timestamp.substring(0, 4)),
                        month: parseInt(mem.timestamp.substring(5, 7)),
                        day: parseInt(mem.timestamp.substring(8, 10)),
                        hour: parseInt(mem.timestamp.substring(11, 13)),
                        minute: parseInt(mem.timestamp.substring(14, 16))
                    };
                    const timeDiff = getTimeDiff(data.time, memTime);
                    if (timeDiff < 24 * 60) score += 2; // 今天的记忆
                    else if (timeDiff < 7 * 24 * 60) score += 1; // 最近一周
                    
                    return { ...mem, relevanceScore: score };
                });
                
                // 按相关性排序并返回前N个
                return scoredMemories
                    .sort((a, b) => b.relevanceScore - a.relevanceScore)
                    .slice(0, limit)
                    .map(mem => mem);
            };

            // --- 日志操作辅助函数 ---
            const addLogMessage = (npcId, message) => {
                setLogs(prev => ({ ...prev, [npcId]: [...(prev[npcId] || []), message] }));
            };

            const updateLogMessage = (npcId, msgId, updateFn) => {
                setLogs(prev => {
                    const c = prev[npcId] || [];
                    return {...prev, [npcId]: c.map(m => m.id === msgId ? updateFn(m) : m)};
                });
            };

            const deleteLogMessage = (npcId, msgId) => {
                setLogs(prev => {
                    const c = prev[npcId] || [];
                    return {...prev, [npcId]: c.filter(m => m.id !== msgId)};
                });
            };

            // --- AI消息处理辅助函数 ---
            const processAiMessage = (rawContent, removeCoord = true) => {
                let content = rawContent;
                if (removeCoord) {
                    content = content.replace(/<coord>[\s\S]*?<\/coord>/ig, '').trim();
                }
                return { rawContent, content: applyRegex(content) };
            };

            const createChatMessage = (role, rawContent, removeCoord = true) => {
                const processed = processAiMessage(rawContent, removeCoord);
                return { id: generateId(), type: 'chat', role, ...processed, time: formatTime(data.time) };
            };

            const createActionMessage = (rawContent) => {
                const processed = processAiMessage(rawContent, true);
                return { id: generateId(), type: 'action', role: 'assistant', ...processed, time: formatTime(data.time) };
            };
            
            const applyRegex = (text) => {
                let res = text;
                data.settings.regexRules.forEach(rule => {
                    if (!rule.pattern) return;
                    try { res = res.replace(new RegExp(rule.pattern, rule.flags), rule.replace || ''); } catch (e) {}
                });
                return res;
            };

            // --- API 模型获取 ---
            const fetchModels = async (apiScope, apiConfig) => {
                if (!apiConfig.baseUrl || !apiConfig.apiKey) { setApiStatus(p => ({...p, [apiScope]: { loading: false, msg: '缺少 URL 或 Key' }})); return; }
                setApiStatus(p => ({...p, [apiScope]: { loading: true, msg: '正在请求...' }}));
                try {
                    const base = getBaseEndpoint(apiConfig.baseUrl);
                    const res = await fetch(`${base}/models`, { headers: { 'Authorization': `Bearer ${apiConfig.apiKey}` } });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const resData = await res.json();
                    if (resData && resData.data && Array.isArray(resData.data)) {
                        const models = resData.data.map(m => m.id);
                        setModelLists(p => ({...p, [apiScope]: models}));
                        setApiStatus(p => ({...p, [apiScope]: { loading: false, msg: `获取 ${models.length} 模型成功` }}));
                    } else throw new Error("返回格式不规范");
                } catch (err) { setApiStatus(p => ({...p, [apiScope]: { loading: false, msg: `失败: ${err.message}` }})); }
            };

            // --- Prompt 引擎 ---
            const buildSystemPrompt = (flowType, npc, extraLogs = []) => {
                let envFull = "";
                let charFull = "";
                const tavernVars = {};
                
                if (npc) {
                    const cMap = data.maps[npc.levelId];
                    
                    // 获取相关记忆
                    let memoryContext = '';
                    if (flowType === 'chat') {
                        const relevantMemories = getRelevantMemories(npc.id, '') || [];
                        if (relevantMemories.length > 0) {
                            memoryContext = `\n[相关记忆]: ${relevantMemories.map(mem => mem?.content || '').join('; ')}`;
                        }
                    }
                    
                    envFull = `[当前位置]: ${cMap.name} (尺寸: ${cMap.w}x${cMap.h})\n[环境描述]: ${cMap.desc}\n[周围可见地标]: ${(cMap.nodes || []).map(n=>`${n.name}(坐标:${n.x},${n.y})`).join(', ') || '暂无'}\n[系统时间]: ${formatTime(data.time)}\n[角色私有记忆]: ${npc.memory || '无特殊记忆'}${memoryContext}\n[当前坐标]: X:${npc.x}, Y:${npc.y}`;
                    charFull = `[角色设定: ${npc.name}]\n` + 
                               (npc.desc ? `描述: ${npc.desc}\n` : '') + 
                               (npc.personality ? `性格: ${npc.personality}\n` : '') + 
                               (npc.scenario ? `当前场景: ${npc.scenario}\n` : '') + 
                               (npc.mesExamples ? `\n[对话风格示例]\n${npc.mesExamples}\n` : '');
                }

                const processTavernMacros = (text) => {
                    if(!text) return "";
                    let result = text;
                    
                    result = result.replace(/{{char}}/g, npc ? npc.name : 'AI');
                    result = result.replace(/{{user}}/g, data.player.name);
                    
                    result = result.replace(/{{setvar::([^:]+)::([^}]+)}}/g, (match, varName, varValue) => {
                        tavernVars[varName] = varValue;
                        return '';
                    });
                    
                    result = result.replace(/{{getvar::([^}]+)}}/g, (match, varName) => {
                        return tavernVars[varName] || '';
                    });
                    
                    result = result.replace(/{{random::([^}]+)}}/g, (match, options) => {
                        const opts = options.split(',');
                        return opts[Math.floor(Math.random() * opts.length)] || '';
                    });
                    
                    result = result.replace(/{{roll (\d+)d(\d+)}}/g, (match, num, sides) => {
                        const n = parseInt(num);
                        const s = parseInt(sides);
                        let total = 0;
                        for (let i = 0; i < n; i++) {
                            total += Math.floor(Math.random() * s) + 1;
                        }
                        return total.toString();
                    });
                    
                    result = result.replace(/{{\/\/[^}]+}}/g, '');
                    result = result.replace(/{{[^}]+\/\/[^}]+}}/g, (match) => {
                        if (match.includes('setvar::') || match.includes('getvar::') || match.includes('random::') || match.includes('roll ')) {
                            return match;
                        }
                        return '';
                    });
                    
                    return result;
                };

                let finalPrompt = "";
                const flowArray = flowType === 'chat' ? data.promptFlowChat : flowType === 'action' ? data.promptFlowAction : data.promptFlowStory;
                const flow = [...flowArray].sort((a,b)=>a.order - b.order);

                const enabledSystemBlocks = flow.filter(b => b.enabled && b.type === 'system');
                enabledSystemBlocks.forEach(block => {
                    processTavernMacros(block.content);
                });

                flow.forEach(block => {
                    if(!block.enabled) return;
                    if(block.type === 'system') {
                        let content = block.content;
                        content = content.replace(/{{setvar::[^}]+}}/g, '');
                        content = content.replace(/{{\/\/[^}]+}}/g, '');
                        finalPrompt += `\n${processTavernMacros(content)}\n`;
                    }
                    else if(block.type === 'worldbook') {
                        const wbContent = (data.worldbooks || []).filter(w=>w.enabled).map(w=>processTavernMacros(w.content)).join('\n');
                        if(wbContent) finalPrompt += `\n[世界设定]\n${wbContent}\n`;
                    }
                    else if(block.type === 'character' && npc) finalPrompt += `\n${processTavernMacros(charFull)}\n`;
                    else if(block.type === 'map' && npc) finalPrompt += `\n[环境变量与记忆]\n${processTavernMacros(envFull)}\n`;
                    else if(block.type === 'logs') finalPrompt += `\n【行动记录】：\n${(extraLogs || []).join('\n')}\n`;
                });

                return applyRegex(finalPrompt);
            };

            const callAPI = async (apiConfig, systemPrompt, messageHistory) => {
                if (!apiConfig || !apiConfig.apiKey) throw new Error("API 未配置");
                const base = getBaseEndpoint(apiConfig.baseUrl);
                const messagesToSend = [{ role: 'system', content: systemPrompt }, ...messageHistory];
                const params = data.settings.generation;
                
                const response = await fetch(`${base}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.apiKey}` },
                    body: JSON.stringify({ 
                        model: apiConfig.model, 
                        messages: messagesToSend, 
                        max_tokens: params.maxTokens,
                        temperature: params.temperature,
                        top_p: params.topP,
                        frequency_penalty: params.frequencyPenalty
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${(await response.json()).error?.message || response.status}`);
                return (await response.json()).choices[0].message.content;
            };

            // --- 游戏行为引擎 ---
            const handleMovePlayer = (dx, dy) => {
                if (view !== 'game') return;
                setData(prev => {
                    const map = prev.maps[prev.currentLevelId];
                    const nx = prev.player.x + dx;
                    const ny = prev.player.y + dy;
                    
                    if (nx < 0 || ny < 0 || nx >= map.w || ny >= map.h) return prev;
                    
                    const isBlocked = (map.blockedTiles || []).some(t => t.x === nx && t.y === ny);
                    if (isBlocked) return prev;

                    let nextLevelId = prev.currentLevelId;
                    let px = nx, py = ny;
                    
                    const nodeOnTile = map.nodes.find(n => n.x === nx && n.y === ny);
                    if (nodeOnTile && nodeOnTile.targetLevel && prev.maps[nodeOnTile.targetLevel]) {
                        const targetMap = prev.maps[nodeOnTile.targetLevel];
                        nextLevelId = nodeOnTile.targetLevel;
                        
                        let targetX = nodeOnTile.targetX;
                        let targetY = nodeOnTile.targetY;
                        
                        if (targetX === undefined || targetY === undefined || targetX === 0 && targetY === 0) {
                            const backNode = targetMap.nodes.find(n => n.targetLevel === prev.currentLevelId);
                            if (backNode) {
                                const candidates = [
                                    {x: backNode.x - 1, y: backNode.y},
                                    {x: backNode.x + 1, y: backNode.y},
                                    {x: backNode.x, y: backNode.y - 1},
                                    {x: backNode.x, y: backNode.y + 1}
                                ];
                                for (const cand of candidates) {
                                    if (cand.x >= 0 && cand.x < targetMap.w && cand.y >= 0 && cand.y < targetMap.h) {
                                        const blocked = (targetMap.blockedTiles || []).some(t => t.x === cand.x && t.y === cand.y);
                                        if (!blocked) {
                                            targetX = cand.x;
                                            targetY = cand.y;
                                            break;
                                        }
                                    }
                                }
                            } else {
                                for (let x = 0; x < targetMap.w; x++) {
                                    for (let y = 0; y < targetMap.h; y++) {
                                        const blocked = (targetMap.blockedTiles || []).some(t => t.x === x && t.y === y);
                                        if (!blocked) {
                                            targetX = x;
                                            targetY = y;
                                            break;
                                        }
                                    }
                                }
                            }
                        }
                        
                        px = targetX;
                        py = targetY;
                    }

                    const timePassed = prev.settings.noTimeMode ? 0 : map.timeCost;
                    return { ...prev, player: { ...prev.player, x: px, y: py, levelId: nextLevelId }, currentLevelId: nextLevelId, time: advanceTime(prev.time, timePassed) };
                });
            };

            const doNpcBackgroundActions = async () => {
                const promises = data.npcs.map(async (npc) => {
                    if (!npc.apiMain || !npc.apiMain.apiKey) return;
                    if (npc.id === activeNpcId && view === 'chat') return; 

                    try {
                        const sysPrompt = buildSystemPrompt('action', npc, []);
                        
                        let history = [];
                        if (data.promptFlowAction.find(f => f.type === 'history')?.enabled) {
                            history = (logs[npc.id] || []).slice(-10).map(l => ({
                                role: l.role === 'user' ? 'user' : 'assistant',
                                content: l.type === 'action' ? `(过去行为) ${l.content}` : l.content
                            }));
                        }

                        const isPlayerNearby = (data.player.levelId === npc.levelId && 
                            Math.abs(data.player.x - npc.x) <= 1 && 
                            Math.abs(data.player.y - npc.y) <= 1);

                        const additionalReminder = !isPlayerNearby ? 
                            '【特别提醒】：玩家不在你身边！不要臆想或虚构与玩家的对话。只描述你自己的行动和想法。' : '';

                        const aiReplyRaw = await callAPI(npc.apiMain, sysPrompt + '\n' + additionalReminder, history);
                        
                        let newX = npc.x, newY = npc.y;
                        const coordMatch = aiReplyRaw.match(/<coord>\s*(\d+)\s*,\s*(\d+)\s*<\/coord>/i);
                        
                        if (coordMatch) {
                            newX = parseInt(coordMatch[1], 10);
                            newY = parseInt(coordMatch[2], 10);
                        } else {
                            const map = data.maps[npc.levelId];
                            const directions = [
                                {dx: 0, dy: -1}, {dx: 0, dy: 1},
                                {dx: -1, dy: 0}, {dx: 1, dy: 0},
                                {dx: 0, dy: 0}
                            ];
                            const randomDir = directions[Math.floor(Math.random() * directions.length)];
                            newX = npc.x + randomDir.dx;
                            newY = npc.y + randomDir.dy;
                        }
                        
                        const actionMsg = createActionMessage(aiReplyRaw);
                        if (actionMsg.content) {
                            addLogMessage(npc.id, actionMsg);
                            // 添加行动记忆
                            addMemory(npc.id, actionMsg.content, `我在 ${data.maps[npc.levelId].name} 行动: ${actionMsg.content}`);
                        }

                        setData(p => {
                            const map = p.maps[npc.levelId];
                            
                            const isTileBlocked = (x, y) => {
                                return (map.blockedTiles || []).some(t => t.x === x && t.y === y);
                            };
                            
                            const isPositionOccupied = (x, y, excludeId) => {
                                return p.npcs.some(n => 
                                    n.id !== excludeId && 
                                    n.x === x && 
                                    n.y === y && 
                                    n.levelId === npc.levelId
                                );
                            };
                            
                            const isPositionValid = (x, y, excludeId) => {
                                return x >= 0 && x < map.w && 
                                       y >= 0 && y < map.h && 
                                       !isTileBlocked(x, y) && 
                                       !isPositionOccupied(x, y, excludeId);
                            };
                            
                            let validX = npc.x;
                            let validY = npc.y;
                            
                            const targetX = Math.max(0, Math.min(map.w - 1, newX));
                            const targetY = Math.max(0, Math.min(map.h - 1, newY));
                            
                            if (isPositionValid(targetX, targetY, npc.id)) {
                                validX = targetX;
                                validY = targetY;
                            } else {
                                const fallbackPositions = [
                                    {x: npc.x, y: npc.y},
                                    {x: npc.x, y: Math.max(0, npc.y - 1)},
                                    {x: npc.x, y: Math.min(map.h - 1, npc.y + 1)},
                                    {x: Math.max(0, npc.x - 1), y: npc.y},
                                    {x: Math.min(map.w - 1, npc.x + 1), y: npc.y}
                                ];
                                
                                for (const pos of fallbackPositions) {
                                    if (isPositionValid(pos.x, pos.y, npc.id)) {
                                        validX = pos.x;
                                        validY = pos.y;
                                        break;
                                    }
                                }
                            }
                            
                            return {
                                ...p, 
                                npcs: p.npcs.map(n => 
                                    n.id === npc.id 
                                        ? {...n, x: validX, y: validY} 
                                        : n
                                )
                            };
                        });
                    } catch(e) { console.error("NPC Action Error:", e); }
                });
                await Promise.all(promises);
            };

            const doGodAiStory = async () => {
                if (!data.globalApi || !data.globalApi.apiKey) return;
                
                let recentLogs = [];
                Object.keys(logs).forEach(npcId => {
                    const npc = data.npcs.find(n=>n.id===npcId);
                    if(!npc) return;
                    const npcLogs = logs[npcId].filter(l => getTimeDiff(data.time, { year: parseInt(l.time.substring(0,4)), month: parseInt(l.time.substring(5,7)), day: parseInt(l.time.substring(8,10)), hour: parseInt(l.time.substring(11,13)), minute: parseInt(l.time.substring(14,16)) }) <= data.settings.storyInterval);
                    npcLogs.forEach(l => {
                        if(l.type === 'action') recentLogs.push(`[${l.time}] ${npc.name}行动: ${l.content}`);
                        else if(l.role === 'user') recentLogs.push(`[${l.time}] ${data.player.name}对${npc.name}说: ${l.content}`);
                        else recentLogs.push(`[${l.time}] ${npc.name}说: ${l.content}`);
                    });
                });

                if (recentLogs.length === 0) recentLogs.push("这段时间内小镇非常宁静，大家都在休息。");

                const sysPrompt = buildSystemPrompt('story', null, recentLogs);

                try {
                    const storyContent = await callAPI(data.globalApi, sysPrompt, []);
                    const todayStr = getDateStr(data.time);
                    setStories(prev => {
                        const curDay = prev[todayStr] || [];
                        return { ...prev, [todayStr]: [...curDay, { time: `${pad(data.time.hour)}:${pad(data.time.minute)}`, content: applyRegex(storyContent) }] };
                    });
                } catch(e) { console.error("Story Gen Error:", e); }

            };
            const extractTavernDataFromJPG = async (arrayBuffer) => {
                const data = new Uint8Array(arrayBuffer);
                const textDecoder = new TextDecoder('utf-8', { fatal: false });
                
                const readUInt16BE = (offset) => {
                    if (offset + 1 >= data.length) return 0;
                    return (data[offset] << 8) | data[offset + 1];
                };
                
                if (data[0] !== 0xFF || data[1] !== 0xD8) {
                    throw new Error('不是有效的 JPG 文件');
                }
                
                let offset = 2;
                while (offset < data.length - 4) {
                    if (data[offset] !== 0xFF) {
                        offset++;
                        continue;
                    }
                    
                    const marker = data[offset + 1];
                    const segmentLength = readUInt16BE(offset + 2);
                    
                    if (segmentLength < 2) {
                        offset += 2;
                        continue;
                    }
                    
                    if (marker >= 0xE0 && marker <= 0xEF) {
                        try {
                            const segmentData = data.slice(offset + 4, offset + 4 + Math.min(segmentLength - 2, data.length - offset - 4));
                            const content = textDecoder.decode(segmentData);
                            
                            const jsonResult = tryExtractJSON(content);
                            if (jsonResult) return jsonResult;
                        } catch (e) {
                            console.error('解析 JPG APP 段失败:', e);
                        }
                    }
                    
                    offset += 2 + segmentLength;
                    if (marker === 0xDA) break;
                }
                
                try {
                    const content = textDecoder.decode(data);
                    const jsonResult = tryExtractJSON(content);
                    if (jsonResult) return jsonResult;
                } catch (e) {
                }
                
                throw new Error('JPG 中未找到酒馆角色卡片数据');
            };

            const fixDoubleEncodedText = (text) => {
                try {
                    const encoder = new TextEncoder('utf-8');
                    const bytes = encoder.encode(text);
                    const decoder = new TextDecoder('gbk');
                    const fixed = decoder.decode(bytes);
                    return fixed;
                } catch (e) {
                    try {
                        const bytes = new Uint8Array(text.length);
                        for (let i = 0; i < text.length; i++) {
                            bytes[i] = text.charCodeAt(i) & 0xFF;
                        }
                        const decoder = new TextDecoder('gbk');
                        return decoder.decode(bytes);
                    } catch (e2) {
                        return text;
                    }
                }
            };

            const fixObjectEncoding = (obj) => {
                if (obj == null) return obj;
                if (typeof obj === 'string') {
                    if (/[\u0080-\uFFFF]{2,}/.test(obj)) {
                        const fixed = fixDoubleEncodedText(obj);
                        if (/[\u4e00-\u9fa5]/.test(fixed)) {
                            return fixed;
                        }
                    }
                    return obj;
                }
                if (Array.isArray(obj)) {
                    return obj.map(item => fixObjectEncoding(item));
                }
                if (typeof obj === 'object') {
                    const newObj = {};
                    for (const key in obj) {
                        newObj[key] = fixObjectEncoding(obj[key]);
                    }
                    return newObj;
                }
                return obj;
            };

            const base64ToUtf8 = (str) => {
                try {
                    const binaryString = atob(str);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    
                    let result = null;
                    
                    try {
                        const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
                        result = utf8Decoder.decode(bytes);
                        if (result && /[\u4e00-\u9fa5]/.test(result)) {
                            return result;
                        }
                    } catch (e) {
                    }
                    
                    try {
                        const utf8Decoder = new TextDecoder('utf-8');
                        result = utf8Decoder.decode(bytes);
                        if (result && /[\u4e00-\u9fa5]/.test(result)) {
                            return result;
                        }
                        if (result) {
                            const fixed = fixGarbledText(result);
                            if (fixed && /[\u4e00-\u9fa5]/.test(fixed)) {
                                return fixed;
                            }
                        }
                    } catch (e) {
                    }
                    
                    try {
                        const gbkDecoder = new TextDecoder('gbk');
                        result = gbkDecoder.decode(bytes);
                        if (result && /[\u4e00-\u9fa5]/.test(result)) {
                            return result;
                        }
                    } catch (e) {
                    }
                    
                    return new TextDecoder('utf-8').decode(bytes);
                } catch (e) {
                    return atob(str);
                }
            };
            
            const fixGarbledText = (text) => {
                try {
                    const encoder = new TextEncoder();
                    const bytes = encoder.encode(text);
                    const decoder = new TextDecoder('gbk');
                    const fixed = decoder.decode(bytes);
                    if (fixed && /[\u4e00-\u9fa5]/.test(fixed)) {
                        return fixed;
                    }
                } catch (e) {
                }
                return text;
            };

            const tryExtractJSON = (content) => {
                if (!content) return null;
                
                try {
                    const trimmed = content.trim();
                    if (trimmed.startsWith('eyJ') || /^[A-Za-z0-9+/=]{20,}$/.test(trimmed)) {
                        try {
                            const decoded = base64ToUtf8(trimmed);
                            const parsed = JSON.parse(decoded);
                            if (parsed && (parsed.name || parsed.data?.name || parsed.spec || parsed.chara)) {
                                return parsed;
                            }
                        } catch (e) {
                        }
                    }
                } catch (e) {
                }
                
                const jsonStart = content.indexOf('{');
                if (jsonStart === -1) return null;
                
                let braceCount = 0;
                let jsonEnd = -1;
                for (let i = jsonStart; i < content.length; i++) {
                    if (content[i] === '{') braceCount++;
                    if (content[i] === '}') {
                        braceCount--;
                        if (braceCount === 0) {
                            jsonEnd = i + 1;
                            break;
                        }
                    }
                }
                
                if (jsonEnd === -1) return null;
                
                const jsonStr = content.slice(jsonStart, jsonEnd);
                try {
                    const parsed = JSON.parse(jsonStr);
                    if (parsed && (parsed.name || parsed.data?.name || parsed.spec || parsed.chara)) {
                        return parsed;
                    }
                } catch (e) {
                }
                return null;
            };

            const extractTavernDataFromPNG = async (arrayBuffer) => {
                const data = new Uint8Array(arrayBuffer);
                const textDecoder = new TextDecoder('utf-8', { fatal: false });
                
                const readUInt32BE = (offset) => {
                    if (offset + 3 >= data.length) return 0;
                    return (data[offset] << 24) | (data[offset + 1] << 16) | (data[offset + 2] << 8) | data[offset + 3];
                };
                
                const pngSignature = [0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A];
                for (let i = 0; i < 8; i++) {
                    if (data[i] !== pngSignature[i]) {
                        throw new Error('不是有效的 PNG 文件');
                    }
                }
                
                let offset = 8;
                while (offset < data.length - 12) {
                    const chunkLength = readUInt32BE(offset);
                    if (chunkLength < 0 || chunkLength > 100 * 1024 * 1024) break;
                    
                    const chunkType = textDecoder.decode(data.slice(offset + 4, offset + 8));
                    
                    if (chunkType === 'tEXt' || chunkType === 'zTXt') {
                        try {
                            const chunkData = data.slice(offset + 8, offset + 8 + Math.min(chunkLength, data.length - offset - 8));
                            let nullIndex = 0;
                            while (nullIndex < chunkData.length && chunkData[nullIndex] !== 0) nullIndex++;
                            
                            const keyword = textDecoder.decode(chunkData.slice(0, nullIndex)).toLowerCase();
                            
                            const targetKeywords = ['chara', 'ccv3', 'character', 'tavern', 'sillytavern', 'card'];
                            const isTargetChunk = targetKeywords.some(k => keyword.includes(k));
                            
                            if (isTargetChunk || keyword === '') {
                                let contentBytes;
                                
                                if (chunkType === 'zTXt' && nullIndex + 1 < chunkData.length) {
                                    const compressionMethod = chunkData[nullIndex + 1];
                                    if (compressionMethod === 0 && nullIndex + 2 < chunkData.length) {
                                        try {
                                            const compressedData = chunkData.slice(nullIndex + 2);
                                            const ds = new DecompressionStream('deflate');
                                            const writer = ds.writable.getWriter();
                                            writer.write(compressedData);
                                            writer.close();
                                            const reader = ds.readable.getReader();
                                            const chunks = [];
                                            let result;
                                            while (!(result = await reader.read()).done) {
                                                chunks.push(result.value);
                                            }
                                            const decompressed = new Uint8Array(chunks.reduce((acc, chunk) => acc + chunk.length, 0));
                                            let pos = 0;
                                            for (const chunk of chunks) {
                                                decompressed.set(chunk, pos);
                                                pos += chunk.length;
                                            }
                                            contentBytes = decompressed;
                                        } catch (e) {
                                            console.error('解压 PNG zTXt 失败:', e);
                                        }
                                    }
                                } else if (nullIndex + 1 < chunkData.length) {
                                    contentBytes = chunkData.slice(nullIndex + 1);
                                }
                                
                                if (contentBytes) {
                                    let content = textDecoder.decode(contentBytes);
                                    content = content.trim();
                                    
                                    const jsonResult = tryExtractJSON(content);
                                    if (jsonResult) return jsonResult;
                                    
                                    try {
                                        if (content.startsWith('eyJ')) {
                                            const decoded = base64ToUtf8(content);
                                            return JSON.parse(decoded);
                                        }
                                    } catch (e) {
                                    }
                                    
                                    try {
                                        return JSON.parse(content);
                                    } catch (e) {
                                    }
                                }
                            }
                        } catch (e) {
                            console.error('解析 PNG 块失败:', e);
                        }
                    }
                    
                    if (chunkType === 'IDAT') {
                        try {
                            const content = textDecoder.decode(data);
                            const jsonResult = tryExtractJSON(content);
                            if (jsonResult) return jsonResult;
                        } catch (e) {
                        }
                    }
                    
                    if (chunkType === 'IEND') break;
                    offset += 12 + chunkLength;
                }
                
                try {
                    const content = textDecoder.decode(data);
                    const jsonResult = tryExtractJSON(content);
                    if (jsonResult) return jsonResult;
                } catch (e) {
                }
                
                throw new Error('PNG 中未找到酒馆角色卡片数据');
            };

            const parseSillyTavernCard = (jsonData) => {

                                if (/[\u4e00-\u9fa5]/.test(fixed)) {

                        if (Array.isArray(obj)) {

                            for (const key in obj) {
                                newObj[key] = fixAllText(obj[key]);
                            }
                            return newObj;
                        }
                        return obj;

                    const fixedData = fixAllText(jsonData);

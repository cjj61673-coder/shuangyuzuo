                                <div><label className="block text-[10px] font-bold text-slate-400 mb-1">对话示例 (MesExamples)</label><textarea value={npc.mesExamples} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, mesExamples:e.target.value} : n)}))} rows={3} placeholder="<START>\n{{user}}: ...\n{{char}}: ..." className="w-full bg-slate-900 border border-slate-700 rounded-xl p-2 text-[10px] font-mono outline-none focus:border-blue-500 resize-none text-slate-300" /></div>
                                <div><label className="block text-[10px] font-bold text-emerald-400 mb-1">系统模板 (Prompt Template)</label><textarea value={npc.promptTemplate} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, promptTemplate:e.target.value} : n)}))} rows={2} className="w-full bg-slate-900/80 border border-emerald-900/50 rounded-xl p-2 text-[10px] outline-none focus:border-emerald-500 font-mono text-emerald-200 resize-none" /></div>

                                {npc.tavernData && (
                                    <div className="bg-slate-900/50 p-3 rounded-xl border border-purple-500/30">
                                        <div className="text-[11px] text-purple-400 font-bold uppercase mb-2">酒馆角色卡扩展数据</div>
                                        <div className="grid grid-cols-2 gap-2 mb-2 text-[10px]">
                                            {npc.tavernData.spec && <div className="text-slate-400">规范: <span className="text-slate-200">{npc.tavernData.spec}</span></div>}
                                            {npc.tavernData.creator && <div className="text-slate-400">作者: <span className="text-slate-200">{npc.tavernData.creator}</span></div>}
                                            {npc.tavernData.character_version && <div className="text-slate-400">版本: <span className="text-slate-200">{npc.tavernData.character_version}</span></div>}
                                            {npc.tavernData.extensions?.talkativeness && <div className="text-slate-400">活跃度: <span className="text-slate-200">{npc.tavernData.extensions.talkativeness}</span></div>}
                                            {npc.tavernData.extensions?.world && <div className="text-slate-400">世界: <span className="text-slate-200">{npc.tavernData.extensions.world}</span></div>}
                                        </div>
                                        {npc.tavernData.tags && npc.tavernData.tags.length > 0 && (
                                            <div className="mb-2">
                                                <span className="text-slate-400 text-[10px]">标签: </span>
                                                {npc.tavernData.tags.map((tag, i) => (
                                                    <span key={i} className="inline-block bg-purple-900/50 text-purple-300 px-2 py-0.5 rounded text-[9px] mr-1 mb-1">{tag}</span>
                                                ))}
                                            </div>
                                        )}
                                        {(npc.tavernData.character_book?.entries?.length > 0 || npc.tavernData.extensions?.regex_scripts?.length > 0 || npc.tavernData.extensions?.depth_prompt) && (
                                            <div className="text-[10px] text-slate-400 mb-2">
                                                {npc.tavernData.character_book?.entries?.length > 0 && <div>📚 世界书条目: {npc.tavernData.character_book.entries.length}</div>}
                                                {npc.tavernData.extensions?.regex_scripts?.length > 0 && <div>⚙️ 正则脚本: {npc.tavernData.extensions.regex_scripts.length}</div>}
                                                {npc.tavernData.alternate_greetings?.length > 0 && <div>💬 开场白: {npc.tavernData.alternate_greetings.length}</div>}
                                                {npc.tavernData.extensions?.depth_prompt?.depth && <div>📊 深度提示词深度: {npc.tavernData.extensions.depth_prompt.depth}</div>}
                                            </div>
                                        )}
                                        {npc.tavernData.creator_notes && (
                                            <div className="mt-2">
                                                <div className="text-slate-400 text-[10px] mb-1">创建者备注:</div>
                                                <div className="bg-slate-950 p-2 rounded text-[9px] text-slate-300 max-h-20 overflow-y-auto">{npc.tavernData.creator_notes}</div>
                                            </div>
                                        )}
                                        {npc.tavernData.extensions?.depth_prompt?.prompt && (
                                            <div className="mt-2">
                                                <div className="text-slate-400 text-[10px] mb-1">深度提示词:</div>
                                                <div className="bg-slate-950 p-2 rounded text-[9px] text-slate-300 max-h-20 overflow-y-auto">{npc.tavernData.extensions.depth_prompt.prompt}</div>
                                            </div>
                                        )}
                                        {npc.tavernData.extensions && Object.keys(npc.tavernData.extensions).length > 0 && (
                                            <div className="mt-2">
                                                <div className="text-slate-400 text-[10px] mb-1">完整 Extensions JSON:</div>
                                                <textarea 
                                                    readOnly 
                                                    value={JSON.stringify(npc.tavernData.extensions, null, 2)} 
                                                    className="w-full bg-slate-950 border border-slate-700 rounded p-2 text-[9px] font-mono text-slate-300 max-h-32 overflow-y-auto resize-none" 
                                                />
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="border border-slate-700 p-3 rounded-xl bg-slate-900/50">
                                    <label className="flex items-center justify-between text-xs mb-2 font-bold text-slate-300"><span>启用固定开场白</span><input type="checkbox" checked={npc.firstMsgEnabled} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, firstMsgEnabled:e.target.checked} : n)}))} className="w-4 h-4 accent-blue-500" /></label>
                                    <textarea value={npc.firstMsg} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, firstMsg:e.target.value} : n)}))} rows={2} className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs outline-none disabled:opacity-50 resize-none" disabled={!npc.firstMsgEnabled} />
                                </div>

                                <div className="bg-slate-900/50 p-4 rounded-xl border border-blue-500/20">
                                    <div className="text-[11px] text-blue-400 font-bold uppercase mb-3 flex items-center">角色独立交互 API</div>
                                    <div className="flex space-x-2 mb-2">
                                        <input type="text" placeholder="Base URL" value={npc.apiMain.baseUrl} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, apiMain:{...n.apiMain, baseUrl:e.target.value}} : n)}))} className="flex-1 bg-slate-800 border border-slate-700 rounded-lg text-xs p-2.5 outline-none focus:border-blue-500" />
                                        <button onClick={()=>fetchModels(`npc_${npc.id}`, npc.apiMain)} className="bg-blue-600/20 text-blue-400 border border-blue-500/50 px-3 rounded-lg text-[10px] font-bold hover:bg-blue-600 hover:text-white transition whitespace-nowrap">
                                            {apiStatus[`npc_${npc.id}`]?.loading ? '...' : '获取列表'}
                                        </button>
                                    </div>
                                    <input type="password" placeholder="API Key" value={npc.apiMain.apiKey} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, apiMain:{...n.apiMain, apiKey:e.target.value}} : n)}))} className="w-full bg-slate-800 border border-slate-700 rounded-lg text-xs p-2.5 mb-2 outline-none focus:border-blue-500" />
                                    
                                    <div className="flex space-x-2 items-center">
                                        {!npc.apiMain.customModel ? (
                                            <select value={npc.apiMain.model} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, apiMain:{...n.apiMain, model:e.target.value}} : n)}))} className="flex-1 bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-xs outline-none focus:border-blue-500 text-slate-200">
                                                <option value="">-- 选择模型 --</option>
                                                {(modelLists[`npc_${npc.id}`] || []).map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        ) : (
                                            <input type="text" placeholder="手动输入模型" value={npc.apiMain.model} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, apiMain:{...n.apiMain, model:e.target.value}} : n)}))} className="flex-1 bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-xs outline-none focus:border-blue-500 text-slate-200" />
                                        )}
                                        <label className="flex items-center text-xs text-slate-400 bg-slate-800 p-2 rounded-lg border border-slate-700 cursor-pointer"><input type="checkbox" checked={npc.apiMain.customModel} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, apiMain:{...n.apiMain, customModel:e.target.checked}} : n)}))} className="mr-1"/>手填</label>
                                    </div>
                                    {apiStatus[`npc_${npc.id}`]?.msg && <div className="text-[9px] mt-1 text-blue-400">{apiStatus[`npc_${npc.id}`].msg}</div>}
                                </div>

                                {/* 提示词沙盘透视 */}
                                <div className="mt-4 bg-black/30 border border-slate-700 rounded-xl overflow-hidden">
                                    <div className="bg-slate-800/80 p-2 border-b border-slate-700 flex justify-between items-center">
                                        <div className="text-[11px] font-bold text-emerald-400 flex items-center"><Icon.Eye c="w-4 h-4 mr-1" /> 沙盘透视 (System Prompt)</div>
                                        <div className="flex space-x-1">
                                            <button onClick={()=>setPreviewTab('chat')} className={`px-2 py-1 text-[10px] rounded ${previewTab==='chat'?'bg-blue-600 text-white':'bg-slate-700 text-slate-400'}`}>主动聊天流</button>
                                            <button onClick={()=>setPreviewTab('action')} className={`px-2 py-1 text-[10px] rounded ${previewTab==='action'?'bg-indigo-600 text-white':'bg-slate-700 text-slate-400'}`}>后台行动流</button>
                                        </div>
                                    </div>
                                    <div className="p-3">
                                        <div className="text-[9px] text-slate-500 mb-2 leading-relaxed">这是目前依据【{previewTab==='chat'?'对话提示词流':'行动提示词流'}】配置，最终拼接后发给 AI 的 System Prompt（未包含对话记录）：</div>
                                        <textarea readOnly value={previewPrompt} rows={12} className="w-full bg-slate-950 border border-slate-700 rounded p-2 text-[10px] font-mono text-emerald-300/80 outline-none resize-none leading-relaxed no-scrollbar" />
                                    </div>
                                </div>

                                {/* 记忆管理 */}
                                <div className="mt-4 bg-amber-950/30 border border-amber-500/20 rounded-xl overflow-hidden">
                                    <div className="bg-slate-800/80 p-3 border-b border-slate-700 flex justify-between items-center">
                                        <div className="text-[11px] font-bold text-amber-400 flex items-center"><Icon.Book c="w-4 h-4 mr-1" /> 记忆管理</div>
                                        <button onClick={()=>organizeMemories(npc.id)} className="text-[10px] text-amber-400 hover:bg-amber-900/30 px-2 py-1 rounded">整理记忆</button>
                                    </div>
                                    <div className="p-3 bg-slate-900/30">
                                        <div className="flex space-x-1 mb-3">
                                            <button onClick={()=>setNpcPreviewTabs(p=>({...p, [npc.id]: 'memory5'}))} className={`px-2 py-1 text-[10px] rounded ${npcPreviewTabs[npc.id] === 'memory5' ? 'bg-red-600 text-white' : 'bg-slate-700 text-slate-400'}`}>核心记忆 (5级)</button>
                                            <button onClick={()=>setNpcPreviewTabs(p=>({...p, [npc.id]: 'memory4'}))} className={`px-2 py-1 text-[10px] rounded ${npcPreviewTabs[npc.id] === 'memory4' ? 'bg-orange-600 text-white' : 'bg-slate-700 text-slate-400'}`}>重要记忆 (4级)</button>
                                            <button onClick={()=>setNpcPreviewTabs(p=>({...p, [npc.id]: 'memory3'}))} className={`px-2 py-1 text-[10px] rounded ${npcPreviewTabs[npc.id] === 'memory3' ? 'bg-yellow-600 text-white' : 'bg-slate-700 text-slate-400'}`}>近期记忆 (3级)</button>
                                            <button onClick={()=>setNpcPreviewTabs(p=>({...p, [npc.id]: 'memory2'}))} className={`px-2 py-1 text-[10px] rounded ${npcPreviewTabs[npc.id] === 'memory2' ? 'bg-green-600 text-white' : 'bg-slate-700 text-slate-400'}`}>次要记忆 (2级)</button>
                                            <button onClick={()=>setNpcPreviewTabs(p=>({...p, [npc.id]: 'memory1'}))} className={`px-2 py-1 text-[10px] rounded ${npcPreviewTabs[npc.id] === 'memory1' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-400'}`}>琐事记忆 (1级)</button>
                                        </div>
                                        
                                        <div className="mb-3">
                                            <div className="flex space-x-2">
                                                <input 
                                                    type="text" 
                                                    placeholder="输入新记忆内容" 
                                                    id={`memory-content-${npc.id}`}
                                                    className="flex-1 bg-slate-800 border border-slate-700 rounded-lg text-xs p-2 outline-none focus:border-amber-500"
                                                />
                                                <input 
                                                    type="text" 
                                                    placeholder="上下文" 
                                                    id={`memory-context-${npc.id}`}
                                                    className="flex-1 bg-slate-800 border border-slate-700 rounded-lg text-xs p-2 outline-none focus:border-amber-500"
                                                />
                                                <button 
                                                    onClick={()=>{
                                                        const content = document.getElementById(`memory-content-${npc.id}`).value;
                                                        const context = document.getElementById(`memory-context-${npc.id}`).value;
                                                        if (content) {
                                                            addMemory(npc.id, content, context);
                                                            document.getElementById(`memory-content-${npc.id}`).value = '';
                                                            document.getElementById(`memory-context-${npc.id}`).value = '';
                                                        }
                                                    }}
                                                    className="bg-amber-600/20 text-amber-400 border border-amber-500/50 px-3 rounded-lg text-[10px] font-bold hover:bg-amber-600 hover:text-white transition whitespace-nowrap"
                                                >
                                                    添加
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="max-h-64 overflow-y-auto">
                                            {(() => {
                                                let memories = [];
                                                switch(npcPreviewTabs[npc.id]) {
                                                    case 'memory5':
                                                        memories = npc.memorySystem?.coreMemories || [];
                                                        break;
                                                    case 'memory4':
                                                        memories = npc.memorySystem?.importantMemories || [];
                                                        break;
                                                    case 'memory3':
                                                        memories = npc.memorySystem?.recentMemories || [];
                                                        break;
                                                    case 'memory2':
                                                        memories = npc.memorySystem?.minorMemories || [];
                                                        break;
                                                    case 'memory1':
                                                        memories = npc.memorySystem?.trivialMemories || [];
                                                        break;
                                                    default:
                                                        memories = [];
                                                }
                                                
                                                if (memories.length === 0) {
                                                    return <div className="text-center text-slate-500 text-[11px] py-4">暂无记忆记录</div>;
                                                }
                                                
                                                return memories.map(mem => (
                                                    <div key={mem.id} className="mb-3 pb-3 border-b border-slate-700/30 last:border-0">
                                                        <div className="flex items-center justify-between mb-1">
                                                            <span className="text-[10px] text-amber-400 font-bold">[{mem.timestamp}]</span>
                                                            <button 
                                                                onClick={()=>{
                                                                    if(confirm('确定删除这条记忆？')){
                                                                        setData(prev => {
                                                                            const updatedNpcs = prev.npcs.map(n => {
                                                                                if (n.id === npc.id) {
                                                                                    const updatedMemorySystem = { ...n.memorySystem };
                                                                                    switch(mem.level) {
                                                                                        case 5:
                                                                                            updatedMemorySystem.coreMemories = updatedMemorySystem.coreMemories.filter(m => m.id !== mem.id);
                                                                                            break;
                                                                                        case 4:
                                                                                            updatedMemorySystem.importantMemories = updatedMemorySystem.importantMemories.filter(m => m.id !== mem.id);
                                                                                            break;
                                                                                        case 3:
                                                                                            updatedMemorySystem.recentMemories = updatedMemorySystem.recentMemories.filter(m => m.id !== mem.id);
                                                                                            break;
                                                                                        case 2:
                                                                                            updatedMemorySystem.minorMemories = updatedMemorySystem.minorMemories.filter(m => m.id !== mem.id);
                                                                                            break;
                                                                                        default:
                                                                                            updatedMemorySystem.trivialMemories = updatedMemorySystem.trivialMemories.filter(m => m.id !== mem.id);
                                                                                    }
                                                                                    return { ...n, memorySystem: updatedMemorySystem };
                                                                                }
                                                                                return n;
                                                                            });
                                                                            return { ...prev, npcs: updatedNpcs };
                                                                        });
                                                                    }
                                                                }}
                                                                className="text-red-400 p-1 hover:bg-red-900/30 rounded"
                                                            >
                                                                <Icon.Trash c="w-4 h-4"/>
                                                            </button>
                                                        </div>
                                                        <div className="text-[12px] text-slate-300 leading-relaxed mb-1">{mem.content}</div>
                                                        {mem.context && <div className="text-[10px] text-slate-500 italic">上下文: {mem.context}</div>}
                                                    </div>
                                                ));
                                            })()}
                                        </div>
                                    </div>
                                </div>

                                {/* 行动日志 */}
                                <div className="mt-4 bg-indigo-950/30 border border-indigo-500/20 rounded-xl overflow-hidden">
                                    <div className="bg-slate-800/80 p-3 border-b border-slate-700 flex justify-between items-center">
                                        <div className="text-[11px] font-bold text-indigo-400 flex items-center"><Icon.Activity c="w-4 h-4 mr-1" /> 行动日志</div>
                                        <button onClick={()=>{if(confirm('确定清除该角色的所有行动日志？')){setLogs(l=>{const nl={...l}; nl[npc.id] = (nl[npc.id]||[]).filter(x=>x.type!=='action'); return nl;});}}} className="text-[10px] text-red-400 hover:bg-red-900/30 px-2 py-1 rounded">清除</button>
                                    </div>
                                    <div className="p-3 max-h-48 overflow-y-auto bg-slate-900/30">
                                        {((logs[npc.id]||[]).filter(x=>x.type==='action')).length===0 && <div className="text-center text-slate-500 text-[11px] py-4">暂无行动记录</div>}
                                        {((logs[npc.id]||[]).filter(x=>x.type==='action')).map(msg => (
                                            <div key={msg.id} className="mb-2 pb-2 border-b border-slate-700/30 last:border-0">
                                                <div className="flex items-center justify-between mb-1">
                                                    <span className="text-[10px] text-indigo-400 font-bold">[{msg.time}]</span>
                                                </div>
                                                <div className="text-[12px] text-slate-300 leading-relaxed">{msg.content}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        );
                    })}
                </div>
            );

            const renderMapTab = () => {
                const mapToEdit = data.maps[editMapId] || data.maps['world'];
                const updateMap = (k, v) => setData(d=>({...d, maps: {...d.maps, [editMapId]: {...d.maps[editMapId], [k]: v}}}));

                const isTileBlocked = (x, y) => {
                    return (mapToEdit.blockedTiles || []).some(t => t.x === x && t.y === y);
                };

                const toggleTile = (x, y) => {
                    const current = mapToEdit.blockedTiles || [];
                    const index = current.findIndex(t => t.x === x && t.y === y);
                    let newBlocked;
                    if (index !== -1) {
                        newBlocked = current.filter((_, i) => i !== index);
                    } else {
                        newBlocked = [...current, { x, y }];
                    }
                    updateMap('blockedTiles', newBlocked);
                };

                const clearAllBlocked = () => {
                    if (confirm('确定清除所有不可通行区域？')) {
                        updateMap('blockedTiles', []);
                    }
                };

                const moveNodeTo = (nodeId, newX, newY) => {
                    if (newX < 0 || newX >= mapToEdit.w || newY < 0 || newY >= mapToEdit.h) return;
                    const nn = [...mapToEdit.nodes];
                    const idx = nn.findIndex(n => n.id === nodeId);
                    if (idx !== -1) {
                        nn[idx] = { ...nn[idx], x: newX, y: newY };
                        updateMap('nodes', nn);
                    }
                };

                const handleNodeMouseDown = (e, node) => {
                    e.stopPropagation();
                    e.preventDefault();
                    setDraggingNode(node.id);
                };

                const handleNodeTouchStart = (e, node) => {
                    e.stopPropagation();
                    e.preventDefault();
                    longPressTimerRef.current = setTimeout(() => {
                        setIsLongPress(true);
                        setDraggingNode(node.id);
                    }, 500);
                };

                const handleNodeTouchMove = (e) => {
                    if (longPressTimerRef.current) {
                        clearTimeout(longPressTimerRef.current);
                        longPressTimerRef.current = null;
                    }
                };

                const handleNodeTouchEnd = () => {
                    if (longPressTimerRef.current) {
                        clearTimeout(longPressTimerRef.current);
                        longPressTimerRef.current = null;
                    }
                    setTimeout(() => {
                        setIsLongPress(false);
                        setDraggingNode(null);
                    }, 100);
                };

                const handleTileClick = (e, x, y) => {
                    if (!draggingNode) {
                        toggleTile(x, y);
                    }
                };

                const handleTileMouseOver = (x, y) => {
                    if (draggingNode) {
                        moveNodeTo(draggingNode, x, y);
                    }
                };

                const handleTileTouchEnter = (e, x, y) => {
                    if (draggingNode && isLongPress) {
                        e.preventDefault();
                        moveNodeTo(draggingNode, x, y);
                    }
                };

                const renderEditorGrid = () => {
                    const grid = [];
                    for (let y = 0; y < mapToEdit.h; y++) {
                        for (let x = 0; x < mapToEdit.w; x++) {
                            const blocked = isTileBlocked(x, y);
                            const hasNode = mapToEdit.nodes.find(n => n.x === x && n.y === y);
                            
                            grid.push(
                                <div 
                                    key={`${x}-${y}`} 
                                    className={`w-full aspect-square flex items-center justify-center text-xs font-bold cursor-pointer transition-all border border-slate-600/50
                                        ${blocked ? 'bg-transparent border-dashed border-slate-700/30 text-slate-600' : 'bg-emerald-900/40 hover:bg-emerald-800/50 text-emerald-300'}
                                        ${hasNode ? 'ring-2 ring-yellow-400' : ''}
                                        ${draggingNode && !blocked ? 'hover:bg-yellow-900/30' : ''}`}
                                    onClick={(e) => handleTileClick(e, x, y)}
                                    onMouseOver={() => handleTileMouseOver(x, y)}
                                    onTouchStart={(e) => handleTileTouchEnter(e, x, y)}
                                    title={hasNode ? `${hasNode.name}${hasNode.desc ? ' - ' + hasNode.desc : ''}` : ''}
                                >
                                    {hasNode && (
                                        <div
                                            className="cursor-grab active:cursor-grabbing select-none"
                                            onMouseDown={(e) => handleNodeMouseDown(e, hasNode)}
                                            onTouchStart={(e) => handleNodeTouchStart(e, hasNode)}
                                            onTouchMove={handleNodeTouchMove}
                                            onTouchEnd={handleNodeTouchEnd}
                                        >
                                            📍
                                        </div>
                                    )}
                                    {!hasNode && blocked ? '✕' : ''}
                                </div>
                            );
                        }
                    }
                    return grid;
                };

                return (
                    <div className="space-y-4 animate-fade-in">
                        <div className="flex space-x-2">
                            <select value={editMapId} onChange={e => setEditMapId(e.target.value)} className="flex-1 bg-slate-800 border border-slate-700 text-slate-200 rounded-xl p-2 outline-none font-bold">
                                {Object.values(data.maps).map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                            <button onClick={() => {
                                const newId = 'm_' + generateId();
                                setData(d=>({...d, maps: {...d.maps, [newId]: { id: newId, name: '新区域', w: 5, h: 5, parent: 'world', timeCost: 5, desc: '', nodes: [], blockedTiles: [] }}})); setEditMapId(newId);
                            }} className="bg-emerald-600/20 text-emerald-400 border border-emerald-500/50 px-3 rounded-xl font-bold hover:bg-emerald-600 hover:text-white"><Icon.Plus c="w-5 h-5"/></button>
                        </div>
                        
                        {mapToEdit && (
                            <>
                                <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-lg space-y-3">
                                    <div className="flex items-center justify-between border-b border-slate-600 pb-2">
                                        <input type="text" value={mapToEdit.name} onChange={e => updateMap('name', e.target.value)} className="bg-transparent text-lg font-extrabold text-blue-300 outline-none focus:border-blue-500 w-32"/>
                                        <button onClick={()=>{ if(editMapId==='world'){alert('无法删除大地图根节点！');return;} if(confirm('确认删除地图？')) { const nm={...data.maps}; delete nm[editMapId]; setData(d=>({...d,maps:nm,currentLevelId:'world'})); setEditMapId('world'); } }} className="text-red-400 p-1"><Icon.Trash c="w-4 h-4"/></button>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <div><label className="text-[10px] text-slate-500 block">宽(W)</label><input type="number" value={mapToEdit.w} onChange={e=>updateMap('w',Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded p-1.5 text-xs outline-none"/></div>
                                        <div><label className="text-[10px] text-slate-500 block">高(H)</label><input type="number" value={mapToEdit.h} onChange={e=>updateMap('h',Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded p-1.5 text-xs outline-none"/></div>
                                        <div><label className="text-[10px] text-slate-500 block">行动耗时(分)</label><input type="number" value={mapToEdit.timeCost} onChange={e=>updateMap('timeCost',Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded p-1.5 text-xs outline-none text-yellow-300"/></div>
                                    </div>
                                    <div><label className="text-[10px] text-slate-500 block mb-1">地图宏观描述</label><textarea value={mapToEdit.desc} onChange={e=>updateMap('desc',e.target.value)} rows={2} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs outline-none resize-none"/></div>
                                </div>

                                <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-lg">
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="font-bold text-sm text-slate-200 flex items-center">
                                            <span className="mr-2">🗺️ 地图形状编辑器</span>
                                            <span className="text-[10px] text-slate-400">(点击格子切换可通行状态)</span>
                                        </h3>
                                        <button onClick={clearAllBlocked} className="bg-red-600/20 text-red-400 border border-red-500/50 px-2 py-1 rounded text-xs hover:bg-red-600 hover:text-white">清除全部</button>
                                    </div>
                                    <div className="flex items-center gap-4 mb-3 text-[11px] text-slate-300">
                                        <div className="flex items-center gap-1"><div className="w-4 h-4 bg-emerald-900/40 border border-slate-600/50"></div>可通行</div>
                                        <div className="flex items-center gap-1"><div className="w-4 h-4 bg-transparent border border-dashed border-slate-700/30 flex items-center justify-center text-xs text-slate-600">✕</div>已移除</div>
                                        <div className="flex items-center gap-1"><span>📍</span>有地标</div>
                                    </div>
                                    <div 
                                        className="grid gap-1 p-2 bg-slate-900/50 rounded-xl"
                                        style={{ gridTemplateColumns: `repeat(${mapToEdit.w}, minmax(0, 1fr))` }}
                                        onMouseUp={() => setDraggingNode(null)}
                                        onMouseLeave={() => setDraggingNode(null)}
                                    >
                                        {renderEditorGrid()}
                                    </div>
                                </div>

                                <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-lg">
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="font-bold text-sm text-slate-200">特殊地块 (节点)</h3>
                                        <div className="flex gap-2">
                                        <button onClick={()=>{const nn=[...mapToEdit.nodes, {id:'n_'+generateId(), name:'新地标', x:0, y:0, targetLevel:'', targetX:0, targetY:0, desc:''}]; updateMap('nodes', nn);}} className="bg-slate-700 text-blue-300 px-2 py-1 rounded text-xs hover:bg-slate-600">+ 添加地块</button>
                                    </div>
                                    </div>
                                    <div className="space-y-2">
                                        {mapToEdit.nodes.map((n, i) => (
                                            <div key={n.id} className="bg-slate-900/80 p-3 rounded-xl border border-slate-700">
                                                <div className="flex justify-between mb-2">
                                                    <input type="text" value={n.name} onChange={e=>{const nn=[...mapToEdit.nodes]; nn[i].name=e.target.value; updateMap('nodes', nn);}} className="bg-transparent font-bold text-sm border-b border-slate-600 outline-none w-20 text-blue-200"/>
                                                    <button onClick={()=>{const nn=mapToEdit.nodes.filter(x=>x.id!==n.id); updateMap('nodes', nn);}} className="text-red-500"><Icon.Trash c="w-3.5 h-3.5"/></button>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 mb-2">
                                                    <div><span className="text-[10px] text-slate-500">当前坐标 X</span><input type="number" value={n.x} onChange={e=>{const nn=[...mapToEdit.nodes]; nn[i].x=Number(e.target.value); updateMap('nodes', nn);}} className="w-full bg-slate-800 border border-slate-700 rounded p-1 text-xs outline-none"/></div>
                                                    <div><span className="text-[10px] text-slate-500">当前坐标 Y</span><input type="number" value={n.y} onChange={e=>{const nn=[...mapToEdit.nodes]; nn[i].y=Number(e.target.value); updateMap('nodes', nn);}} className="w-full bg-slate-800 border border-slate-700 rounded p-1 text-xs outline-none"/></div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-2 mb-2">
                                                    <div>
                                                        <span className="text-[10px] text-slate-500">传送至</span>
                                                        <select value={n.targetLevel} onChange={e=>{const nn=[...mapToEdit.nodes]; nn[i].targetLevel=e.target.value; updateMap('nodes', nn);}} className="w-full bg-slate-800 border border-slate-700 rounded p-1 text-[10px] outline-none text-emerald-300"><option value="">无</option>{Object.values(data.maps).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select>
                                                    </div>
                                                    <div><span className="text-[10px] text-slate-500">落点 X</span><input type="number" value={n.targetX || 0} onChange={e=>{const nn=[...mapToEdit.nodes]; nn[i].targetX=Number(e.target.value); updateMap('nodes', nn);}} className="w-full bg-slate-800 border border-slate-700 rounded p-1 text-xs outline-none"/></div>
                                                    <div><span className="text-[10px] text-slate-500">落点 Y</span><input type="number" value={n.targetY || 0} onChange={e=>{const nn=[...mapToEdit.nodes]; nn[i].targetY=Number(e.target.value); updateMap('nodes', nn);}} className="w-full bg-slate-800 border border-slate-700 rounded p-1 text-xs outline-none"/></div>
                                                </div>
                                                {n.targetLevel && (
                                                    <div className="mb-2">
                                                        <button onClick={()=>{
                                                            const targetMapId = n.targetLevel;
                                                            const targetMap = data.maps[targetMapId];
                                                            if (!targetMap) return;
                                                            let tx = n.targetX || 0;
                                                            let ty = n.targetY || 0;
                                                            if (tx === 0 && ty === 0) {
                                                                tx = Math.floor(targetMap.w / 2);
                                                                ty = Math.floor(targetMap.h / 2);
                                                            }
                                                            const backNode = {
                                                                id: 'n_' + generateId(),
                                                                name: '返回' + mapToEdit.name,
                                                                x: tx,
                                                                y: ty,
                                                                targetLevel: editMapId,
                                                                targetX: n.x,
                                                                targetY: n.y,
                                                                desc: '返回 ' + mapToEdit.name + ' 的传送点。'
                                                            };
                                                            const updatedTargetNodes = [...targetMap.nodes, backNode];
                                                            setData(prev => ({
                                                                ...prev,
                                                                maps: {
                                                                    ...prev.maps,
                                                                    [targetMapId]: {
                                                                        ...prev.maps[targetMapId],
                                                                        nodes: updatedTargetNodes
                                                                    }
                                                                }
                                                            }));
                                                        }} className="w-full bg-indigo-600/20 text-indigo-300 border border-indigo-500/50 px-2 py-1 rounded text-xs hover:bg-indigo-600 hover:text-white">+ 创建双向传送（在目标地图添加返回点）</button>
                                                    </div>
                                                )}
                                                <input type="text" value={n.desc} placeholder="细节描述 (AI可见)" onChange={e=>{const nn=[...mapToEdit.nodes]; nn[i].desc=e.target.value; updateMap('nodes', nn);}} className="w-full bg-slate-800 border border-slate-700 rounded p-1.5 text-xs outline-none text-slate-300"/>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                );
            };

            const renderDataTab = () => (
                <div className="flex flex-col items-center justify-center space-y-6 pt-6 animate-fade-in">
                    <Icon.Settings c="w-16 h-16 text-slate-600 mb-2" />
                    <div className="text-center px-6 text-slate-400 text-sm leading-relaxed mb-4">
                        备份并导出包含所有设置、对话和小说记录。<br/>直接将导出的长文本粘贴给他人即可分享剧本。
                    </div>
                    <button onClick={exportData} className="w-3/4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">📦 导出所有数据</button>
                    <button onClick={importData} className="w-3/4 bg-slate-800 border border-slate-600 hover:bg-slate-700 text-slate-200 font-bold py-3 rounded-xl transition-all active:scale-95">📥 导入数据</button>
                    <div className="mt-8 w-full border-t border-red-900/50 pt-6 text-center">
                        <button onClick={()=>{if(confirm("确定清空所有数据？不可恢复！")){localStorage.clear();window.location.reload();}}} className="text-red-500 text-xs font-bold bg-red-900/10 px-4 py-2 rounded-lg border border-red-900/30">⚠️ 硬重置系统 (清空缓存)</button>
                    </div>
                </div>
            );

            // --- 组装渲染设置主界面 ---
            const renderSettings = () => {
                const tabs = [
                    { id: 'globalApi', label: '上帝API', icon: Icon.Settings },
                    { id: 'system', label: '系统配置', icon: Icon.Clock },
                    { id: 'prompts', label: '提示词流', icon: Icon.Menu },
                    { id: 'world', label: '世界书', icon: Icon.Book },
                    { id: 'player', label: '玩家', icon: Icon.User },
                    { id: 'npcs', label: '角色', icon: Icon.Female },
                    { id: 'map', label: '地图', icon: Icon.Map },
                    { id: 'data', label: '数据', icon: Icon.Trash }
                ];

                return (
                    <div className="flex flex-col h-full w-full sm:max-w-2xl mx-auto sm:py-6 animate-slide-up">
                        <div className="flex-1 flex flex-col glass-panel sm:rounded-3xl overflow-hidden shadow-2xl">
                            <div className="flex items-center justify-between p-4 bg-slate-800/90 border-b border-slate-700/50 shrink-0">
                                <h2 className="text-lg font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-slate-400">控制面板</h2>
                                <button onClick={() => setView('game')} className="bg-blue-600/20 text-blue-400 border border-blue-500/30 px-4 py-1.5 rounded-xl text-sm font-bold hover:bg-blue-600 hover:text-white">关闭</button>
                            </div>
                            <div className="flex flex-wrap bg-slate-900/80 border-b border-slate-700/50 shrink-0 p-1">
                                {tabs.map(t => (
                                    <button key={t.id} onClick={() => setSettingsTab(t.id)} className={`w-1/4 sm:flex-1 py-2 px-1 text-[10px] sm:text-xs font-bold flex flex-col items-center justify-center rounded-lg transition-all ${settingsTab===t.id ? 'bg-slate-700 text-blue-400' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <t.icon c="w-4 h-4 mb-1"/>{t.label}
                                    </button>
                                ))}
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-900/30 pb-12 space-y-6">
                                {settingsTab === 'globalApi' && renderGlobalApiTab()}
                                {settingsTab === 'system' && renderSystemTab()}
                                {settingsTab === 'prompts' && renderPromptsTab()}
                                {settingsTab === 'world' && renderWorldbooksTab()}
                                {settingsTab === 'player' && renderPlayerTab()}
                                {settingsTab === 'npcs' && renderNpcsTab()}
                                {settingsTab === 'map' && renderMapTab()}
                                {settingsTab === 'data' && renderDataTab()}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="w-full h-full">
                    {view === 'game' && renderGame()}
                    {view === 'chat' && renderChat()}
                    {view === 'calendar' && renderCalendar()}
                    {view === 'settings' && renderSettings()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

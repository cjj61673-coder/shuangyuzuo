                    ctx.clearRect(0, 0, size, size);
                    
                    const bobY = Math.sin(frame * Math.PI / 2) * 1.8;
                    const legOffset = Math.sin(frame * Math.PI / 2) * 3.5;
                    const armOffset = Math.sin((frame + 2) * Math.PI / 2) * 2.5;
                    const bodyLean = Math.sin(frame * Math.PI / 2) * 0.8;
                    const scale = size / 64;
                    
                    ctx.save();
                    ctx.translate(size / 2, size / 2 - 23 * scale + bobY * scale);
                    ctx.rotate(bodyLean * 0.02);
                    ctx.scale(scale, scale);

                    if (direction === 'down') {
                        ctx.fillStyle = heroColors.pants;
                        ctx.fillRect(-8, 30, 6, 15 + (frame % 2 === 0 ? legOffset : -legOffset));
                        ctx.fillRect(2, 30, 6, 15 + (frame % 2 === 0 ? -legOffset : legOffset));

                        ctx.fillStyle = heroColors.pantsLight;
                        ctx.fillRect(-7, 31, 4, 12 + (frame % 2 === 0 ? legOffset * 0.7 : -legOffset * 0.7));
                        ctx.fillRect(3, 31, 4, 12 + (frame % 2 === 0 ? -legOffset * 0.7 : legOffset * 0.7));

                        ctx.fillStyle = heroColors.shoes;
                        ctx.fillRect(-10, 44 + (frame % 2 === 0 ? legOffset : -legOffset), 8, 4);
                        ctx.fillRect(2, 44 + (frame % 2 === 0 ? -legOffset : legOffset), 8, 4);

                        ctx.fillStyle = heroColors.shoesLight;
                        ctx.fillRect(-9, 45 + (frame % 2 === 0 ? legOffset : -legOffset), 4, 2);
                        ctx.fillRect(3, 45 + (frame % 2 === 0 ? -legOffset : legOffset), 4, 2);

                        ctx.fillStyle = heroColors.shirt;
                        ctx.fillRect(-10, 18, 20, 16);
                        ctx.fillStyle = heroColors.shirtShadow;
                        ctx.fillRect(3, 18, 7, 16);
                        ctx.fillStyle = heroColors.shirtLight;
                        ctx.fillRect(-9, 19, 5, 14);

                        ctx.fillStyle = heroColors.skin;
                        ctx.fillRect(-12 + armOffset, 20, 4, 10);
                        ctx.fillRect(8 - armOffset, 20, 4, 10);

                        ctx.fillStyle = heroColors.skin;
                        ctx.beginPath();
                        ctx.arc(0, 10, 10, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.skinShadow;
                        ctx.beginPath();
                        ctx.ellipse(5, 13, 3, 4, 0.3, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.hair;
                        ctx.beginPath();
                        ctx.arc(0, 5, 11, Math.PI, 0);
                        ctx.fill();
                        ctx.fillRect(-11, 3, 22, 5);

                        ctx.fillStyle = heroColors.hairMid;
                        ctx.beginPath();
                        ctx.arc(0, 6, 8, Math.PI, 0);
                        ctx.fill();

                        ctx.fillStyle = heroColors.eyes;
                        ctx.beginPath();
                        ctx.arc(-4, 10, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, 10, 2, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.eyesHighlight;
                        ctx.beginPath();
                        ctx.arc(-3, 9, 1, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(5, 9, 1, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'up') {
                        ctx.fillStyle = heroColors.pants;
                        ctx.fillRect(-8, 30, 6, 15 + (frame % 2 === 0 ? legOffset : -legOffset));
                        ctx.fillRect(2, 30, 6, 15 + (frame % 2 === 0 ? -legOffset : legOffset));

                        ctx.fillStyle = heroColors.pantsLight;
                        ctx.fillRect(-7, 31, 4, 12 + (frame % 2 === 0 ? legOffset * 0.7 : -legOffset * 0.7));
                        ctx.fillRect(3, 31, 4, 12 + (frame % 2 === 0 ? -legOffset * 0.7 : legOffset * 0.7));

                        ctx.fillStyle = heroColors.shoes;
                        ctx.fillRect(-10, 44 + (frame % 2 === 0 ? legOffset : -legOffset), 8, 4);
                        ctx.fillRect(2, 44 + (frame % 2 === 0 ? -legOffset : legOffset), 8, 4);

                        ctx.fillStyle = heroColors.shoesLight;
                        ctx.fillRect(-9, 45 + (frame % 2 === 0 ? legOffset : -legOffset), 4, 2);
                        ctx.fillRect(3, 45 + (frame % 2 === 0 ? -legOffset : legOffset), 4, 2);

                        ctx.fillStyle = heroColors.shirt;
                        ctx.fillRect(-10, 18, 20, 16);
                        ctx.fillStyle = heroColors.shirtShadow;
                        ctx.fillRect(3, 18, 7, 16);
                        ctx.fillStyle = heroColors.shirtLight;
                        ctx.fillRect(-9, 19, 5, 14);

                        ctx.fillStyle = heroColors.skin;
                        ctx.fillRect(-12 + armOffset, 20, 4, 10);
                        ctx.fillRect(8 - armOffset, 20, 4, 10);

                        ctx.fillStyle = heroColors.hair;
                        ctx.beginPath();
                        ctx.arc(0, 12, 10, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.hairMid;
                        ctx.beginPath();
                        ctx.arc(0, 11, 7, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.skin;
                        ctx.beginPath();
                        ctx.arc(0, 15, 9, 0, Math.PI);
                        ctx.fill();

                        ctx.fillStyle = heroColors.skinShadow;
                        ctx.beginPath();
                        ctx.ellipse(4, 17, 3, 3, 0.3, 0, Math.PI);
                        ctx.fill();
                    } else if (direction === 'left' || direction === 'right') {
                        const isLeft = direction === 'left';
                        
                        ctx.save();
                        if (isLeft) {
                            ctx.scale(-1, 1);
                        }
                        
                        ctx.fillStyle = heroColors.pants;
                        ctx.fillRect(-4, 30, 6, 15 + (frame % 2 === 0 ? legOffset : -legOffset));
                        ctx.fillRect(2, 30, 6, 15 + (frame % 2 === 0 ? -legOffset : legOffset));

                        ctx.fillStyle = heroColors.pantsLight;
                        ctx.fillRect(-3, 31, 4, 12 + (frame % 2 === 0 ? legOffset * 0.7 : -legOffset * 0.7));
                        ctx.fillRect(3, 31, 4, 12 + (frame % 2 === 0 ? -legOffset * 0.7 : legOffset * 0.7));

                        ctx.fillStyle = heroColors.shoes;
                        ctx.fillRect(-6, 44 + (frame % 2 === 0 ? legOffset : -legOffset), 8, 4);
                        ctx.fillRect(0, 44 + (frame % 2 === 0 ? -legOffset : legOffset), 8, 4);

                        ctx.fillStyle = heroColors.shoesLight;
                        ctx.fillRect(-5, 45 + (frame % 2 === 0 ? legOffset : -legOffset), 4, 2);
                        ctx.fillRect(1, 45 + (frame % 2 === 0 ? -legOffset : legOffset), 4, 2);

                        ctx.fillStyle = heroColors.shirt;
                        ctx.fillRect(-8, 18, 16, 16);
                        ctx.fillStyle = heroColors.shirtShadow;
                        ctx.fillRect(0, 18, 8, 16);
                        ctx.fillStyle = heroColors.shirtLight;
                        ctx.fillRect(-7, 19, 5, 14);

                        ctx.fillStyle = heroColors.skin;
                        ctx.fillRect(-10 - armOffset, 20, 4, 10);
                        ctx.fillRect(6 + armOffset, 20, 4, 10);

                        ctx.fillStyle = heroColors.skin;
                        ctx.beginPath();
                        ctx.arc(0, 10, 9, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.skinShadow;
                        ctx.beginPath();
                        ctx.ellipse(3, 12, 3, 4, 0, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.hair;
                        ctx.beginPath();
                        ctx.arc(0, 4, 10, Math.PI, 0);
                        ctx.fill();
                        ctx.fillRect(-10, 1, 20, 6);
                        ctx.beginPath();
                        ctx.ellipse(-6, 7, 4, 6, 0, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.hairMid;
                        ctx.beginPath();
                        ctx.arc(0, 5, 7, Math.PI, 0);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.ellipse(-5, 7, 3, 4, 0, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = heroColors.eyes;
                        ctx.beginPath();
                        ctx.ellipse(2, 10, 3, 4, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = heroColors.eyesHighlight;
                        ctx.beginPath();
                        ctx.ellipse(2.5, 9, 1.5, 1.5, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = heroColors.outline;
                        ctx.beginPath();
                        ctx.arc(2, 10, 1.5, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.restore();
                    }

                    ctx.restore();
                }, [direction, frame, size]);

                return <canvas ref={canvasRef} width={size} height={size} style={{ imageRendering: 'pixelated' }} />;
            };

        const [playerDirection, setPlayerDirection] = useState('down');
        const [playerWalkFrame, setPlayerWalkFrame] = useState(0);
        const [isMoving, setIsMoving] = useState(false);
        const moveFrameRef = useRef(null);

        useEffect(() => {
            if (isMoving) {
                moveFrameRef.current = setInterval(() => {
                    setPlayerWalkFrame(prev => (prev + 1) % 4);
                }, 150);
            } else {
                clearInterval(moveFrameRef.current);
                setPlayerWalkFrame(0);
            }
            return () => clearInterval(moveFrameRef.current);
        }, [isMoving]);

        const lastPlayerPosRef = useRef({ x: data.player.x, y: data.player.y });
        useEffect(() => {
            if (data.player.x !== lastPlayerPosRef.current.x || data.player.y !== lastPlayerPosRef.current.y) {
                if (data.player.x > lastPlayerPosRef.current.x) setPlayerDirection('right');
                else if (data.player.x < lastPlayerPosRef.current.x) setPlayerDirection('left');
                else if (data.player.y > lastPlayerPosRef.current.y) setPlayerDirection('down');
                else if (data.player.y < lastPlayerPosRef.current.y) setPlayerDirection('up');
                
                setIsMoving(true);
                setTimeout(() => setIsMoving(false), 200);
                
                lastPlayerPosRef.current = { x: data.player.x, y: data.player.y };
            }
        }, [data.player.x, data.player.y]);

        // --- UI 渲染提取 ---
            const renderGame = () => {
                const grid = [];
                for (let y = 0; y < currentMap.h; y++) {
                    for (let x = 0; x < currentMap.w; x++) {
                        let isPlayer = data.player.x === x && data.player.y === y && data.player.levelId === currentMap.id;
                        let npcOnTile = data.npcs.find(n => n.x === x && n.y === y && n.levelId === currentMap.id);
                        let nodeOnTile = currentMap.nodes.find(n => n.x === x && n.y === y);
                        let isAdjacent = npcOnTile && (Math.abs(data.player.x - x) + Math.abs(data.player.y - y) === 1);
                        let isBlocked = (currentMap.blockedTiles || []).some(t => t.x === x && t.y === y);

                        if (!isBlocked) {
                            grid.push(
                                <div key={`${x}-${y}`} className={`w-full h-full border border-slate-700/10 flex items-center justify-center relative transition-colors duration-300 bg-slate-800/80
                                    ${nodeOnTile ? 'bg-indigo-900/20' : ''} 
                                    ${isAdjacent ? 'ring-2 ring-blue-400 ring-inset cursor-pointer z-10 bg-blue-900/20' : ''}`}
                                    onClick={() => isAdjacent && npcOnTile ? handleInteract(npcOnTile) : null}
                                    title={nodeOnTile ? `${nodeOnTile.name}${nodeOnTile.desc ? ' - ' + nodeOnTile.desc : ''}` : ''}
                                >
                                    {nodeOnTile && <div className="absolute top-1 text-[9px] text-indigo-300/80 font-bold tracking-wider">{nodeOnTile.name}</div>}
                                    {nodeOnTile && nodeOnTile.targetLevel && <Icon.Map c="w-1/2 h-1/2 text-indigo-500 opacity-20" />}
                                    
                                    {isPlayer && <div className="absolute w-3/4 h-3/4 bg-blue-500/20 rounded-full blur-md"></div>}
                                    {isPlayer && (
                                        <div className="absolute flex items-center justify-center">
                                            <HeroSprite direction={playerDirection} frame={playerWalkFrame} size={48} />
                                        </div>
                                    )}
                                    
                                    {npcOnTile && (
                                        <div className={`flex flex-col items-center absolute ${npcOnTile.bg} rounded-full p-1.5`}>
                                            {npcOnTile.gender === 'male' ? <Icon.Male c={`${npcOnTile.color} w-6 h-6`} /> : <Icon.Female c={`${npcOnTile.color} w-6 h-6 drop-shadow-[0_0_8px_currentColor]`} />}
                                            {isAdjacent && <span className="absolute -top-7 bg-slate-800 text-blue-300 border border-slate-600 text-[10px] px-2 py-0.5 rounded-md shadow-xl whitespace-nowrap font-bold">💬 对话</span>}
                                        </div>
                                    )}
                                </div>
                            );
                        } else {
                            grid.push(
                                <div key={`${x}-${y}`} className="w-full h-full border-0 bg-transparent"></div>
                            );
                        }
                    }
                }

                return (
                    <div className="flex flex-col items-center w-full max-w-md mx-auto h-full pt-4 px-3 select-none-all animate-fade-in">
                        <div className="w-full flex flex-col glass-panel p-3 rounded-2xl mb-4 shadow-xl">
                            <div className="flex justify-between items-center mb-3 border-b border-slate-700/50 pb-2">
                                <h1 className="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">{currentMap.name}</h1>
                                <div className="flex space-x-2">
                                    <button onClick={() => setView('calendar')} className="p-2 bg-yellow-600/20 border border-yellow-500/30 hover:bg-yellow-600/40 text-yellow-400 rounded-xl transition-all shadow-md"><Icon.Calendar c="w-5 h-5"/></button>
                                    <button onClick={() => setView('settings')} className="p-2 bg-slate-800/80 hover:bg-slate-700 rounded-xl transition-all text-slate-300"><Icon.Settings c="w-5 h-5" /></button>
                                </div>
                            </div>
                            <div className="flex justify-between text-xs text-slate-300 font-bold bg-slate-900/50 p-2 rounded-lg items-center">
                                <span className="flex items-center text-indigo-300"><Icon.Clock c="w-4 h-4 mr-1.5"/> {formatTime(data.time)}</span>
                                {currentMap.parent && <button onClick={() => setData(p => ({...p, currentLevelId: p.maps[p.currentLevelId].parent, player: {...p.player, levelId: p.maps[p.currentLevelId].parent}}))} className="text-blue-400 border border-blue-500/30 px-3 py-1 rounded bg-blue-900/20 hover:bg-blue-900/40 transition">返回大地图</button>}
                            </div>
                        </div>

                        <div className="w-full aspect-square rounded-3xl overflow-hidden grid shadow-2xl p-1 relative" style={{ gridTemplateColumns: `repeat(${currentMap.w}, minmax(0, 1fr))`, background: 'transparent' }}>
                            {grid}
                        </div>

                        <div className="mt-8 grid grid-cols-3 gap-3 w-56">
                            <div />
                            <button onClick={() => handleMovePlayer(0, -1)} className="glass-panel text-blue-300 p-4 rounded-2xl flex justify-center active:scale-95 transition-all shadow-lg hover:bg-slate-700/50"><Icon.ArrowUp c="w-7 h-7"/></button>
                            <div />
                            <button onClick={() => handleMovePlayer(-1, 0)} className="glass-panel text-blue-300 p-4 rounded-2xl flex justify-center active:scale-95 transition-all shadow-lg hover:bg-slate-700/50"><Icon.ArrowLeft c="w-7 h-7"/></button>
                            <button onClick={() => handleMovePlayer(0, 1)} className="glass-panel text-blue-300 p-4 rounded-2xl flex justify-center active:scale-95 transition-all shadow-lg hover:bg-slate-700/50"><Icon.ArrowDown c="w-7 h-7"/></button>
                            <button onClick={() => handleMovePlayer(1, 0)} className="glass-panel text-blue-300 p-4 rounded-2xl flex justify-center active:scale-95 transition-all shadow-lg hover:bg-slate-700/50"><Icon.ArrowRight c="w-7 h-7"/></button>
                        </div>
                    </div>
                );
            };

            const renderChat = () => {
                if (!activeNpcId) return null;
                const npc = data.npcs.find(n => n.id === activeNpcId);
                const history = logs[activeNpcId] || [];

                return (
                    <div className="flex flex-col h-full w-full sm:max-w-md mx-auto sm:py-6 animate-slide-up">
                        <div className="flex-1 flex flex-col glass-panel sm:rounded-3xl overflow-hidden shadow-2xl">
                            <div className="flex flex-col p-4 bg-slate-800/90 border-b border-slate-700/50 shrink-0 z-10">
                                <div className="flex items-center justify-between mb-1">
                                    <div className="flex items-center space-x-3">
                                        <div className={`${npc.bg} p-2 rounded-xl`}><Icon.Female c={`${npc.color} w-6 h-6 drop-shadow-[0_0_8px_currentColor]`} /></div>
                                        <div><h2 className="font-bold text-slate-100 text-lg">{npc.name}</h2></div>
                                    </div>
                                    <button onClick={() => setView('game')} className="p-2 hover:bg-slate-600 rounded-full text-slate-300"><Icon.X c="w-5 h-5" /></button>
                                </div>
                                <div className="text-[10px] text-slate-400 text-center uppercase tracking-wider">行动日志与对话流</div>
                            </div>

                            <div ref={logScrollRef} className="flex-1 p-4 overflow-y-auto space-y-5 no-scrollbar bg-slate-900/40">
                                {history.filter(msg => msg.type !== 'action').length === 0 && <div className="flex h-full items-center justify-center text-slate-500 text-sm">暂无交互记录</div>}
                                {history.filter(msg => msg.type !== 'action').map((msg) => {
                                    
                                    const isUser = msg.role === 'user';
                                    let htmlBlocks = [];
                                    if (data.settings.enableCodeExecution && !isUser && typeof msg.content === 'string') {
                                        const codeBlockRegex = new RegExp('\\x60\\x60\\x60(?:html|javascript|js)?\\n([\\s\\S]*?)\\x60\\x60\\x60', 'g');
                                        const matches = msg.content.match(codeBlockRegex) || [];
                                        const replacer = new RegExp('\\x60\\x60\\x60(?:html|javascript|js)?\\n|\\x60\\x60\\x60', 'g');
                                        htmlBlocks = matches.map(b => b.replace(replacer, ''));
                                    }

                                    return (
                                        <div key={msg.id} className={`flex flex-col ${isUser ? 'items-end' : 'items-start'} animate-pop-in`}>
                                            <span className="text-[9px] text-slate-500 mb-1 opacity-70 px-1">{msg.time.substring(11)}</span>
                                            
                                            {!isUser && (
                                                <div className="flex items-center space-x-1 mb-1">
                                                    <button 
                                                        onClick={() => regenerateMessage(msg.id)} 
                                                        disabled={regeneratingMessageId === msg.id || isTyping}
                                                        className="p-1.5 hover:bg-slate-700/50 rounded-lg transition-all disabled:opacity-30"
                                                        title="重新生成"
                                                    >
                                                        {regeneratingMessageId === msg.id ? 
                                                            <div className="w-4 h-4 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div> : 
                                                            <Icon.Refresh c="w-4 h-4 text-indigo-400" />
                                                        }
                                                    </button>
                                                    {editingMessageId === msg.id ? (
                                                        <button 
                                                            onClick={() => saveEditMessage(msg.id)}
                                                            className="p-1.5 hover:bg-emerald-700/50 rounded-lg transition-all"
                                                            title="保存"
                                                        >
                                                            <Icon.Save c="w-4 h-4 text-emerald-400" />
                                                        </button>
                                                    ) : (
                                                        <button 
                                                            onClick={() => startEditMessage(msg)}
                                                            className="p-1.5 hover:bg-yellow-700/50 rounded-lg transition-all"
                                                            title="编辑"
                                                        >
                                                            <Icon.Edit c="w-4 h-4 text-yellow-400" />
                                                        </button>
                                                    )}
                                                    <button 
                                                        onClick={() => deleteMessage(msg.id)}
                                                        className="p-1.5 hover:bg-red-700/50 rounded-lg transition-all"
                                                        title="删除"
                                                    >
                                                        <Icon.Trash c="w-4 h-4 text-red-400" />
                                                    </button>
                                                </div>
                                            )}
                                            
                                            <div className={`msg-bubble max-w-[90%] p-3.5 leading-relaxed shadow-lg ${isUser ? 'bg-blue-600 text-white rounded-2xl rounded-tr-sm' : 'bg-slate-800 border border-slate-700/50 text-slate-200 rounded-2xl rounded-tl-sm'}`}>
                                                {!isUser && editingMessageId === msg.id ? (
                                                    <textarea
                                                        value={editingMessageContent}
                                                        onChange={(e) => setEditingMessageContent(e.target.value)}
                                                        className="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm outline-none focus:border-blue-500 resize-none min-h-[80px]"
                                                        autoFocus
                                                    />
                                                ) : (
                                                    data.settings.enableCodeRender ? 
                                                    <div className="markdown-body text-[14px]" dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }} /> : 
                                                    <span className="whitespace-pre-wrap text-[14px]">{msg.content}</span>
                                                )}
                                            </div>
                                            {!isUser && data.settings.enableCodeExecution && htmlBlocks.map((block, i) => (
                                                <div key={i} className="max-w-[90%] w-full mt-2 self-start"><ExecutableBlock htmlCode={block} /></div>
                                            ))}
                                        </div>
                                    );
                                })}
                                {isTyping && (
                                    <div className="flex justify-start animate-fade-in">
                                        <div className="bg-slate-800/80 border border-slate-700 p-4 rounded-2xl rounded-tl-sm flex space-x-1.5">
                                            <div className="w-2 h-2 bg-slate-500 rounded-full animate-bounce"></div>
                                            <div className="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style={{animationDelay:'0.2s'}}></div>
                                            <div className="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style={{animationDelay:'0.4s'}}></div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="p-3 bg-slate-800/90 border-t border-slate-700/50 pb-safe shrink-0">
                                <div className="flex space-x-2 items-end">
                                    <textarea 
                                        value={inputText} onChange={(e) => setInputText(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDirectMessage(); } }}
                                        placeholder={`对 ${npc.name} 说话...`} className="flex-1 px-4 py-3 bg-slate-900 border border-slate-700/50 rounded-2xl text-sm text-white focus:outline-none focus:border-blue-500 resize-none h-12 max-h-32 no-scrollbar" disabled={isTyping}
                                    />
                                    <button onClick={sendDirectMessage} disabled={isTyping || !inputText.trim()} className="bg-blue-600 text-white p-3 rounded-2xl hover:bg-blue-500 disabled:opacity-50 shrink-0"><Icon.Send c="w-6 h-6" /></button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderCalendar = () => {
                const dates = Object.keys(stories).sort((a,b)=> new Date(b) - new Date(a));
                const activeDate = selectedDate || (dates.length > 0 ? dates[0] : null);
                const activeStories = activeDate ? stories[activeDate] : [];

                return (
                    <div className="flex flex-col h-full w-full max-w-2xl mx-auto sm:py-6 animate-slide-up text-sm">
                        <div className="flex-1 flex flex-col glass-panel sm:rounded-3xl shadow-2xl overflow-hidden">
                            <div className="flex items-center justify-between p-4 bg-slate-800/90 border-b border-slate-700 shrink-0">
                                <h2 className="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-600 flex items-center"><Icon.Book c="w-6 h-6 mr-2 text-yellow-500"/> 命运之书 (全镇记录)</h2>
                                <button onClick={() => setView('game')} className="p-2 bg-slate-700/50 hover:bg-slate-600 rounded-full text-slate-300"><Icon.X c="w-5 h-5"/></button>
                            </div>
                            <div className="flex flex-1 overflow-hidden">
                                <div className="w-1/3 border-r border-slate-700 bg-slate-900/50 overflow-y-auto p-2 space-y-1">
                                    {dates.length === 0 && <div className="text-slate-500 text-center mt-5 text-xs">暂无记载</div>}
                                    {dates.map(d => (
                                        <button key={d} onClick={()=>setSelectedDate(d)} className={`w-full text-left p-3 rounded-xl transition-all font-bold ${activeDate===d ? 'bg-yellow-600/20 text-yellow-400 border border-yellow-500/30' : 'text-slate-400 hover:bg-slate-800'}`}>
                                            {d}
                                        </button>
                                    ))}
                                </div>

            const renderGlobalApiTab = () => (
                <div className="bg-slate-800/80 p-5 rounded-2xl border border-yellow-500/30 shadow-[0_0_15px_rgba(234,179,8,0.1)] animate-fade-in">

                    <div className="flex space-x-2 mb-3">
                        <input type="text" placeholder="Base URL (例如 https://api.openai.com/v1)" value={data.globalApi.baseUrl} onChange={e=>setData(p=>({...p, globalApi:{...p.globalApi, baseUrl:e.target.value}}))} className="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm outline-none focus:border-yellow-500 text-slate-200" />
                        <button onClick={()=>fetchModels('global', data.globalApi)} className="bg-yellow-600/20 text-yellow-400 border border-yellow-500/50 px-3 rounded-lg text-xs font-bold hover:bg-yellow-600 hover:text-white transition whitespace-nowrap">
                            {apiStatus['global']?.loading ? '...' : '获取列表'}
                        </button>
                    </div>
                    <input type="password" placeholder="API Key" value={data.globalApi.apiKey} onChange={e=>setData(p=>({...p, globalApi:{...p.globalApi, apiKey:e.target.value}}))} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm mb-3 outline-none focus:border-yellow-500 text-slate-200" />
                    
                    <div className="flex space-x-2 items-center">
                        {!data.globalApi.customModel ? (
                            <select value={data.globalApi.model} onChange={e=>setData(p=>({...p, globalApi:{...p.globalApi, model:e.target.value}}))} className="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm outline-none focus:border-yellow-500 text-slate-200">
                                <option value="">-- 请从列表中选择 --</option>
                                {(modelLists['global'] || []).map(m => <option key={m} value={m}>{m}</option>)}
                            </select>
                        ) : (
                            <input type="text" placeholder="手动输入模型 ID" value={data.globalApi.model} onChange={e=>setData(p=>({...p, globalApi:{...p.globalApi, model:e.target.value}}))} className="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm outline-none focus:border-yellow-500 text-slate-200" />
                        )}
                        <label className="flex items-center text-xs text-slate-400 cursor-pointer bg-slate-800 p-2.5 rounded-lg border border-slate-700"><input type="checkbox" checked={data.globalApi.customModel} onChange={e=>setData(p=>({...p, globalApi:{...p.globalApi, customModel:e.target.checked}}))} className="mr-2"/>手填</label>
                    </div>
                    {apiStatus['global']?.msg && <div className="text-[10px] mt-2 text-yellow-500">{apiStatus['global'].msg}</div>}
                </div>
            );

            const renderSystemTab = () => (
                <div className="space-y-4 animate-fade-in">
                    <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700">
                        <h3 className="font-bold text-blue-400 mb-3 text-sm">系统时间修改</h3>
                        <div className="grid grid-cols-5 gap-2 mb-2 bg-slate-900/50 p-2 rounded-xl">
                            {Object.keys(data.time).map(k => (
                                <div key={k} className="flex flex-col text-center">
                                    <span className="text-[10px] text-slate-500 font-bold mb-1">{k==='year'?'年':k==='month'?'月':k==='day'?'日':k==='hour'?'时':'分'}</span>
                                    <input type="number" value={data.time[k]} onChange={e => setData(p=>({...p, time:{...p.time, [k]:Number(e.target.value)}}))} className="w-full bg-slate-800 border border-slate-700 rounded text-xs p-1 text-center outline-none focus:border-blue-500 text-blue-200"/>
                                </div>
                            ))}
                        </div>
                        <label className="flex items-center justify-between py-2 text-xs"><span>时停模式 (移动无时间流逝)</span><input type="checkbox" checked={data.settings.noTimeMode} onChange={e=>setData(p=>({...p, settings: {...p.settings, noTimeMode: e.target.checked}}))} className="w-4 h-4" /></label>
                    </div>
                    <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700">
                        <h3 className="font-bold text-indigo-400 mb-3 text-sm">引擎心跳</h3>
                        <div className="mb-3"><label className="block text-xs text-slate-400 mb-1">NPC 独立行动间隔 (分钟)</label><input type="number" value={data.settings.npcActionInterval} onChange={e=>setData(p=>({...p, settings: {...p.settings, npcActionInterval: Number(e.target.value)}}))} className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm outline-none" /></div>
                        <div><label className="block text-xs text-slate-400 mb-1">上帝AI撰写小说结算间隔 (分钟)</label><input type="number" value={data.settings.storyInterval} onChange={e=>setData(p=>({...p, settings: {...p.settings, storyInterval: Number(e.target.value)}}))} className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm outline-none" /></div>
                    </div>
                    <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700">
                        <h3 className="font-bold text-orange-400 mb-3 text-sm">生成参数 (Generation)</h3>
                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <div><label className="block text-xs text-slate-400 mb-1">最大令牌数 (Max Tokens)</label><input type="number" value={data.settings.generation.maxTokens} onChange={e=>setData(p=>({...p, settings: {...p.settings, generation: {...p.settings.generation, maxTokens: Number(e.target.value)}}}))} className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm outline-none" /></div>
                            <div><label className="block text-xs text-slate-400 mb-1">温度 (Temperature)</label><input type="number" step="0.1" value={data.settings.generation.temperature} onChange={e=>setData(p=>({...p, settings: {...p.settings, generation: {...p.settings.generation, temperature: Number(e.target.value)}}}))} className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm outline-none" /></div>
                        </div>
                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <div><label className="block text-xs text-slate-400 mb-1">Top P</label><input type="number" step="0.05" value={data.settings.generation.topP} onChange={e=>setData(p=>({...p, settings: {...p.settings, generation: {...p.settings.generation, topP: Number(e.target.value)}}}))} className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm outline-none" /></div>
                            <div><label className="block text-xs text-slate-400 mb-1">频率惩罚 (Freq. Penalty)</label><input type="number" step="0.1" value={data.settings.generation.frequencyPenalty} onChange={e=>setData(p=>({...p, settings: {...p.settings, generation: {...p.settings.generation, frequencyPenalty: Number(e.target.value)}}}))} className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm outline-none" /></div>
                        </div>
                        <label className="flex items-center justify-between py-2 text-xs border-t border-slate-700 mt-2 pt-3"><span>开启代码执行 (运行HTML/JS)</span><input type="checkbox" checked={data.settings.enableCodeExecution} onChange={e=>setData(p=>({...p, settings: {...p.settings, enableCodeExecution: e.target.checked}}))} className="w-4 h-4" /></label>
                    </div>
                    <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-lg">
                        <h3 className="font-bold text-purple-400 mb-4 text-sm flex items-center"> 正则过滤规则</h3>
                        {data.settings.regexRules.map((rule, idx) => (
                            <div key={rule.id} className="flex space-x-2 mb-3 items-center">
                                <input type="text" placeholder="正则: \[.*?\]" value={rule.pattern} onChange={e=>{const nr=[...data.settings.regexRules];nr[idx].pattern=e.target.value;setData(p=>({...p, settings: {...p.settings, regexRules: nr}}));}} className="flex-1 w-0 bg-slate-900 border border-slate-700 text-xs p-2 rounded outline-none font-mono" />
                                <input type="text" placeholder="替换为" value={rule.replace} onChange={e=>{const nr=[...data.settings.regexRules];nr[idx].replace=e.target.value;setData(p=>({...p, settings: {...p.settings, regexRules: nr}}));}} className="w-16 bg-slate-900 border border-slate-700 text-xs p-2 rounded outline-none" />
                                <button onClick={()=>{const nr=data.settings.regexRules.filter((_,i)=>i!==idx);setData(p=>({...p, settings: {...p.settings, regexRules: nr}}));}} className="text-red-400 p-2"><Icon.Trash c="w-4 h-4"/></button>
                            </div>
                        ))}
                        <button onClick={()=>{setData(p=>({...p, settings: {...p.settings, regexRules: [...p.settings.regexRules, {id:generateId(), pattern:'', flags:'g', replace:''}]}}))}} className="w-full py-2 border border-dashed border-purple-500/50 text-purple-400 rounded text-xs hover:bg-purple-900/20">+ 新增规则</button>
                    </div>
                </div>
            );

            const renderPromptsTab = () => {
                const activeFlow = promptFlowTab === 'chat' ? data.promptFlowChat : promptFlowTab === 'action' ? data.promptFlowAction : data.promptFlowStory;
                const updateFlow = (newFlow) => {
                    if (promptFlowTab === 'chat') setData(p=>({...p, promptFlowChat: newFlow}));
                    else if (promptFlowTab === 'action') setData(p=>({...p, promptFlowAction: newFlow}));
                    else setData(p=>({...p, promptFlowStory: newFlow}));
                };
                
                const sortedFlow = [...activeFlow].sort((a,b)=>a.order-b.order);

                const handleDragStart = (e, prompt) => {
                    setDraggingPrompt(prompt.id);
                    e.dataTransfer.effectAllowed = 'move';
                };

                const handleDragOver = (e, index) => {
                    e.preventDefault();
                    if (draggingPrompt && dragOverIndex !== index) {
                        setDragOverIndex(index);
                    }
                };

                const handleDrop = (e, targetIndex) => {
                    e.preventDefault();
                    if (draggingPrompt) {
                        const dragIndex = sortedFlow.findIndex(p => p.id === draggingPrompt);
                        if (dragIndex !== -1 && dragIndex !== targetIndex) {
                            const newArr = [...sortedFlow];
                            const [removed] = newArr.splice(dragIndex, 1);
                            newArr.splice(targetIndex, 0, removed);
                            newArr.forEach((x, i) => x.order = i);
                            updateFlow(newArr);
                        }
                    }
                    setDraggingPrompt(null);
                    setDragOverIndex(null);
                };

                const handleDragEnd = () => {
                    setDraggingPrompt(null);
                    setDragOverIndex(null);
                };
                
                return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex p-1 bg-slate-900 rounded-xl">
                        <button onClick={()=>setPromptFlowTab('chat')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${promptFlowTab==='chat'?'bg-blue-600 text-white':'text-slate-400'}`}>主动对话</button>
                        <button onClick={()=>setPromptFlowTab('action')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${promptFlowTab==='action'?'bg-indigo-600 text-white':'text-slate-400'}`}>后台行动</button>
                        <button onClick={()=>setPromptFlowTab('story')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${promptFlowTab==='story'?'bg-yellow-600 text-white':'text-slate-400'}`}>上帝小说</button>
                    </div>
                    <div className="flex gap-2 mb-3">
                        <label className="flex-1 py-2 bg-green-600/20 border border-green-500/50 text-green-400 rounded-xl font-bold text-xs hover:bg-green-600/30 flex items-center justify-center cursor-pointer">
                            <input type="file" accept="application/json,.json" className="hidden" onChange={(e) => {
                                if (e.target.files && e.target.files[0]) {
                                    handleImportTavernPreset(e.target.files[0]);
                                    e.target.value = '';
                                }
                            }} />
                            📥 导入酒馆提示词流
                        </label>
                    </div>
                    <div className="bg-slate-800 p-3 rounded-xl text-xs text-slate-400 leading-relaxed border border-slate-700">
                        此界面为提示词的**组装车间**。发送给 API 时，会自上而下拼接打勾的条目（越靠下权重越高）。<span className="text-blue-300 font-bold">💡 提示：可直接拖动左侧拖拽手柄来重新排序！</span>
                    </div>
                    {sortedFlow.map((p, idx) => (
                        <div 
                            key={p.id} 
                            className={`bg-slate-800/80 border ${p.enabled?'border-blue-500/30':'border-slate-700/50 opacity-50'} rounded-2xl p-3 flex items-center
                                ${draggingPrompt === p.id ? 'opacity-50 bg-slate-700' : ''}
                                ${dragOverIndex === idx && draggingPrompt !== p.id ? 'border-t-4 border-t-blue-500' : ''}`}
                            draggable
                            onDragStart={(e) => handleDragStart(e, p)}
                            onDragOver={(e) => handleDragOver(e, idx)}
                            onDrop={(e) => handleDrop(e, idx)}
                            onDragEnd={handleDragEnd}
                        >
                            <div className="cursor-grab active:cursor-grabbing p-2 mr-1 text-slate-500 hover:text-slate-300">
                                <Icon.Menu c="w-4 h-4" />
                            </div>
                            <button onClick={()=>{updateFlow(activeFlow.map(x=>x.id===p.id?{...x,enabled:!x.enabled}:x))}} className="p-2 mr-2 outline-none">
                                {p.enabled ? <Icon.Eye c="w-5 h-5 text-emerald-400" /> : <Icon.EyeOff c="w-5 h-5 text-slate-500" />}
                            </button>
                            <div className="flex-1 min-w-0 pr-2">
                                {p.type === 'system' ? (
                                    <><input type="text" value={p.name} onChange={e=>{const nf=[...activeFlow];nf.find(x=>x.id===p.id).name=e.target.value;updateFlow(nf)}} className="bg-transparent font-bold text-sm text-blue-200 outline-none border-b border-slate-600 w-full mb-1"/><textarea value={p.content} onChange={e=>{const nf=[...activeFlow];nf.find(x=>x.id===p.id).content=e.target.value;updateFlow(nf)}} rows={2} className="w-full bg-slate-900/50 border border-slate-700 rounded p-1 text-[10px] text-slate-300 outline-none resize-none font-mono"/></>
                                ) : (
                                    <><div className="font-bold text-sm text-slate-200 truncate">{p.name}</div><div className="text-[10px] text-slate-500 truncate">{p.content}</div></>
                                )}
                            </div>
                            <div className="flex flex-col bg-slate-900 rounded-lg border border-slate-700">
                                <button onClick={()=>{
                                    const arr=[...activeFlow].sort((a,b)=>a.order-b.order);
                                    if(idx===0) return; [arr[idx], arr[idx-1]] = [arr[idx-1], arr[idx]];
                                    arr.forEach((x,i)=>x.order=i); updateFlow(arr);
                                }} disabled={idx===0} className="p-1 hover:bg-slate-700 disabled:opacity-30"><Icon.ArrowUp c="w-4 h-4 text-slate-400"/></button>
                                <div className="h-px bg-slate-700"></div>
                                <button onClick={()=>{
                                    const arr=[...activeFlow].sort((a,b)=>a.order-b.order);
                                    if(idx===arr.length-1) return; [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
                                    arr.forEach((x,i)=>x.order=i); updateFlow(arr);
                                }} disabled={idx===activeFlow.length-1} className="p-1 hover:bg-slate-700 disabled:opacity-30"><Icon.ArrowDown c="w-4 h-4 text-slate-400"/></button>
                            </div>
                            {p.type === 'system' && <button onClick={()=>{updateFlow(activeFlow.filter(x=>x.id!==p.id))}} className="ml-2 text-red-400 p-2"><Icon.Trash c="w-4 h-4"/></button>}
                        </div>
                    ))}
                    <button onClick={()=>{updateFlow([...activeFlow, {id:generateId(), type:'system', name:'自定义指令', content:'', enabled:true, order:activeFlow.length}])}} className="w-full py-3 bg-slate-800 border border-dashed border-blue-500/50 text-blue-400 rounded-2xl font-bold">+ 新增系统指令块</button>
                </div>
                );
            };

            const renderWorldbooksTab = () => (
                <div className="space-y-4 animate-fade-in">
                    <div className="bg-blue-900/20 text-blue-300 border border-blue-800/50 p-3 rounded-xl text-xs leading-relaxed">
                        【世界书】你在这里创建的条目，会自动注入到所有提示词流的“世界书容器”中。
                    </div>
                    {data.worldbooks.map((wb, idx) => (
                        <div key={wb.id} className="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-4 shadow-lg">
                            <div className="flex justify-between items-center mb-3">
                                <label className="flex items-center"><input type="checkbox" checked={wb.enabled} onChange={e=>{const n=[...data.worldbooks];n[idx].enabled=e.target.checked;setData(d=>({...d,worldbooks:n}));}} className="mr-2" /><input type="text" value={wb.title} onChange={e=>{const n=[...data.worldbooks];n[idx].title=e.target.value;setData(d=>({...d,worldbooks:n}));}} className="bg-transparent font-bold text-sm text-blue-200 outline-none border-b border-slate-600 w-48"/></label>
                                <button onClick={()=>{setData(d=>({...d, worldbooks: d.worldbooks.filter((_,i)=>i!==idx)}));}} className="text-red-400 p-1"><Icon.Trash c="w-4 h-4"/></button>
                            </div>
                            <textarea value={wb.content} onChange={e=>{const n=[...data.worldbooks];n[idx].content=e.target.value;setData(d=>({...d,worldbooks:n}));}} rows={4} className="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-3 text-xs outline-none focus:border-blue-500 resize-none font-mono text-slate-300" placeholder="详细设定内容..." />
                        </div>
                    ))}
                    <button onClick={()=>{setData(d=>({...d, worldbooks:[...d.worldbooks, {id:generateId(), title:'新设定', enabled:true, content:''}]}))}} className="w-full py-4 bg-slate-800 border border-dashed border-blue-500/50 text-blue-400 rounded-2xl font-bold">+ 新建世界设定</button>
                </div>
            );

            const renderPlayerTab = () => (
                <div className="bg-slate-800/80 p-5 rounded-2xl border border-slate-700 shadow-lg space-y-4 animate-fade-in">
                    <div className="flex space-x-2">
                        <div className="flex-1"><label className="block text-xs font-bold text-slate-400 mb-1">你的名字</label><input type="text" value={data.player.name} onChange={e=>setData(p=>({...p,player:{...p.player,name:e.target.value}}))} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 font-bold" /></div>
                        <div className="w-24"><label className="block text-xs font-bold text-slate-400 mb-1">性别</label><select value={data.player.gender} onChange={e=>setData(p=>({...p,player:{...p.player,gender:e.target.value}}))} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm outline-none"><option value="male">男</option><option value="female">女</option><option value="other">其他</option></select></div>
                    </div>
                    <div>
                        <label className="block text-xs font-bold text-slate-400 mb-1">玩家详情设定 (外貌、能力)</label>
                        <textarea value={data.player.desc} onChange={e=>setData(p=>({...p,player:{...p.player,desc:e.target.value}}))} rows={5} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm outline-none focus:border-blue-500 resize-none leading-relaxed" />
                    </div>
                </div>
            );

            const renderNpcsTab = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex gap-3">
                        <button onClick={()=>{
                            setData(p=>({...p, npcs:[...p.npcs, {
                                id: 'npc_'+generateId(), name: '新角色', gender: 'female', desc: '', personality: '', scenario: '', memory: '', mesExamples: '', firstMsgEnabled: false, firstMsg: '', x: 0, y: 0, levelId: data.currentLevelId, color: 'text-slate-400', bg: 'bg-slate-500/20', promptTemplate: '你的名字是{{name}}。设定：{{desc}}。当前时间：{{time}}。你的位置：{{map_info}}。', apiMain: { baseUrl: '', apiKey: '', model: '', customModel: false }
                            }]}));
                        }} className="flex-1 py-3 bg-blue-600/20 border border-blue-500/50 text-blue-400 rounded-2xl font-bold hover:bg-blue-600/30">+ 创建新角色</button>
                        <label className="flex-1 py-3 bg-purple-600/20 border border-purple-500/50 text-purple-400 rounded-2xl font-bold hover:bg-purple-600/30 flex items-center justify-center cursor-pointer">
                            <input type="file" accept="application/json,image/png,image/jpeg,.json,.png,.jpg,.jpeg" className="hidden" onChange={(e) => {
                                if (e.target.files && e.target.files[0]) {
                                    handleImportTavernFile(e.target.files[0]);
                                    e.target.value = '';
                                }
                            }} />
                            📥 导入角色卡
                        </label>
                    </div>
                    <div className="bg-purple-900/20 text-purple-300 border border-purple-800/50 p-3 rounded-xl text-xs leading-relaxed">
                        支持导入 SillyTavern/TavernAI 的角色卡片（JSON、PNG 或 JPG 格式，V1/V2/V3）。导入的角色会出现在当前地图的中心位置。
                    </div>

                    {data.npcs.map((npc, npcIdx) => {
                        const previewTab = npcPreviewTabs[npc.id] || 'chat';
                        const setPreviewTab = (tab) => setNpcPreviewTabs(p => ({...p, [npc.id]: tab}));
                        const previewPrompt = buildSystemPrompt(previewTab, npc, previewTab==='action'?[]:null);

                        return (
                        <div key={npc.id} className="bg-slate-800/80 p-5 rounded-3xl border border-slate-700/50 shadow-xl relative overflow-hidden mt-6">
                            <div className={`absolute top-0 left-0 w-1 h-full ${npc.bg} opacity-50`}></div>
                            <div className="flex items-center justify-between mb-4 border-b border-slate-700/50 pb-3">
                                <div className="flex items-center">
                                    <div className={`${npc.bg} p-2 rounded-xl mr-3`}>{npc.gender==='male'?<Icon.Male c={`${npc.color} w-5 h-5`} />:<Icon.Female c={`${npc.color} w-5 h-5`} />}</div>
                                    <input type="text" value={npc.name} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, name:e.target.value} : n)}))} className="bg-transparent font-extrabold text-lg w-24 outline-none text-slate-100 border-b border-slate-600 focus:border-blue-500" />
                                </div>
                                <div className="flex space-x-2">

                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">性格设定 (Personality)</label><textarea value={npc.personality} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, personality:e.target.value} : n)}))} rows={3} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-2 text-xs outline-none focus:border-blue-500 resize-none" /></div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">场景设定 (Scenario)</label><textarea value={npc.scenario} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, scenario:e.target.value} : n)}))} rows={2} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-2 text-xs outline-none focus:border-blue-500 resize-none" /></div>
                                    <div><label className="block text-[10px] font-bold text-indigo-400 mb-1">角色私有记忆 (Memory)</label><textarea value={npc.memory} onChange={e=>setData(d=>({...d, npcs: d.npcs.map(n=>n.id===npc.id ? {...n, memory:e.target.value} : n)}))} rows={2} placeholder="写入让角色记住的重要事件..." className="w-full bg-slate-900 border border-indigo-900/50 rounded-xl p-2 text-xs outline-none focus:border-indigo-500 resize-none text-indigo-200" /></div>
